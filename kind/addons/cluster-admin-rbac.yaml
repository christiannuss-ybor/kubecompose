# kubeadm normally creates this binding during `init`; a fresh etcd has it not.
# Without it, admin.conf (cert group O=kubeadm:cluster-admins) has ZERO perms —
# only super-admin.conf (O=system:masters, hardwired in the RBAC authorizer)
# works. Applying this (via super-admin.conf) restores cluster-admin to
# admin.conf, which is what the node's KUBECONFIG and `kubectl exec` checks use.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeadm:cluster-admins
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: kubeadm:cluster-admins
