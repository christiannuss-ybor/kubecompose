# kindnet CNI as a STATIC POD (kubelet launches it from this dir — CNI comes up
# with the node, no API-apply sidecar, no scheduler).
#
# kindnetd hardcodes in-cluster ServiceAccount-token auth (reads
# /var/run/secrets/kubernetes.io/serviceaccount/token, ignores KUBECONFIG), and
# static pods get NO projected token. So we fake the in-cluster environment:
#   - KUBERNETES_SERVICE_HOST/PORT env  → where client-go dials the apiserver
#   - token   ← a static bearer token the apiserver accepts via --token-auth-file
#   - ca.crt  ← cluster CA so TLS to 172.18.0.2:6443 validates
#   - namespace
# The token's user (system:kindnet) is authorized by the apiserver's static
# ABAC policy (readonly), so nothing here depends on etcd / RBAC objects.
apiVersion: v1
kind: Pod
metadata:
  name: kindnet
  namespace: kube-system
  labels:
    tier: node
    app: kindnet
    k8s-app: kindnet
spec:
  hostNetwork: true
  priorityClassName: system-node-critical
  containers:
    - name: kindnet-cni
      image: docker.io/kindest/kindnetd:v20251212-v0.29.0-alpha-105-g20ccfc88
      env:
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_SUBNET
          value: 10.244.0.0/16
        # in-cluster config needs these; static pods don't get them injected.
        - name: KUBERNETES_SERVICE_HOST
          value: 172.18.0.2
        - name: KUBERNETES_SERVICE_PORT
          value: "6443"
      volumeMounts:
        - name: cni-cfg
          mountPath: /etc/cni/net.d
        - name: xtables-lock
          mountPath: /run/xtables.lock
          readOnly: false
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
        - name: nri-plugin
          mountPath: /var/run/nri
        # Faked ServiceAccount dir — individual files the in-cluster loader reads.
        - name: sa-token
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount/token
          readOnly: true
        - name: sa-ca
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          readOnly: true
        - name: sa-namespace
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount/namespace
          readOnly: true
      resources:
        requests:
          cpu: "100m"
          memory: "50Mi"
        limits:
          cpu: "100m"
          memory: "50Mi"
      securityContext:
        privileged: false
        capabilities:
          add: ["NET_RAW", "NET_ADMIN"]
  volumes:
    - name: cni-cfg
      hostPath:
        path: /etc/cni/net.d
    - name: xtables-lock
      hostPath:
        path: /run/xtables.lock
        type: FileOrCreate
    - name: lib-modules
      hostPath:
        path: /lib/modules
    - name: nri-plugin
      hostPath:
        path: /var/run/nri
    - name: sa-token
      hostPath:
        path: /etc/kubernetes/pki/kindnet-sa-token
        type: File
    - name: sa-ca
      hostPath:
        path: /etc/kubernetes/pki/ca.crt
        type: File
    - name: sa-namespace
      hostPath:
        path: /etc/kubernetes/pki/kindnet-namespace
        type: File
