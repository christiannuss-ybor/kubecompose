# kube-proxy as a STATIC POD (was a DaemonSet in addons/kube-proxy.yaml).
# kubelet launches it from this dir — no API-apply sidecar, no scheduler.
#
# Unlike kindnet, kube-proxy reads a real kubeconfig (clientConnection.kubeconfig
# in its config), so no in-cluster token faking is needed. Our config.conf
# (mounted from /etc/kubernetes/kube-proxy/config.conf) points it at
# super-admin.conf — client-cert auth, works with no etcd-backed RBAC, so this
# pod has no dependency on the addons sidecar or any ServiceAccount.
apiVersion: v1
kind: Pod
metadata:
  name: kube-proxy
  namespace: kube-system
  labels:
    k8s-app: kube-proxy
spec:
  hostNetwork: true
  priorityClassName: system-node-critical
  containers:
    - name: kube-proxy
      image: registry.k8s.io/kube-proxy:v1.35.0
      command:
        - /usr/local/bin/kube-proxy
        - --config=/var/lib/kube-proxy/config.conf
        - --hostname-override=$(NODE_NAME)
      env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      securityContext:
        privileged: true
      volumeMounts:
        - name: kube-proxy-config
          mountPath: /var/lib/kube-proxy/config.conf
          readOnly: true
        - name: kubeconfig
          mountPath: /etc/kubernetes/super-admin.conf
          readOnly: true
        - name: xtables-lock
          mountPath: /run/xtables.lock
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
  volumes:
    - name: kube-proxy-config
      hostPath:
        path: /etc/kubernetes/kube-proxy/config.conf
        type: File
    - name: kubeconfig
      hostPath:
        path: /etc/kubernetes/super-admin.conf
        type: File
    - name: xtables-lock
      hostPath:
        path: /run/xtables.lock
        type: FileOrCreate
    - name: lib-modules
      hostPath:
        path: /lib/modules
