# Reverse-engineered from a real `kind create cluster` single-node cluster
# (kind v0.31.0 / k8s v1.35.0), with NO kubeadm in the boot path.
#
# kind normally runs `kubeadm init` over `docker exec` to mint certs/kubeconfigs/
# manifests and bring up the control plane. Here that state was harvested from a
# live node and is mounted in instead, so the node boots the control plane
# straight from files. A single service, the node:
#   systemd → kubelet → static pods (apiserver/etcd/controller-manager/scheduler
#   + kindnet + kube-proxy), all off mounted certs+manifests. A oneshot systemd
#   unit (apply-addons.service) then applies what a fresh tmpfs etcd lacks:
#   storage, CoreDNS, cluster-admin RBAC.

services:
  control-plane:
    image: kindest/node:v1.35.0
    container_name: re-control-plane
    hostname: re-control-plane

    # kindest/node ships its own entrypoint that execs systemd (/sbin/init).
    # This matches the inspected Entrypoint exactly — don't override it.
    # (Listed here only for documentation; the image default is identical.)
    entrypoint: ["/usr/local/bin/entrypoint", "/sbin/init"]

    # kind runs nodes privileged with all confinement disabled so that
    # containerd + kubelet can manage cgroups, mounts, and namespaces inside.
    privileged: true
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - label=disable

    # Private cgroup namespace — required for systemd-in-container on cgroup v2.
    cgroup: private

    tmpfs:
      - /run
      - /tmp

    environment:
      KUBECONFIG: /etc/kubernetes/admin.conf
      container: docker
      KIND_EXPERIMENTAL_CONTAINERD_SNAPSHOTTER: ""

    volumes:
      # Host kernel modules, read-only — kube-proxy / CNI load modules from here.
      - /lib/modules:/lib/modules:ro

      # --- surgical /var volumes (replaces the old blanket `var:/var`) ---
      # Each is a NAMED volume, not a bind: on first create Docker seeds an
      # empty named volume with whatever the image already has at that path, so
      # baked-in content survives the split (bind mounts would NOT get seeded).
      #
      # containerd store. MUST be a volume for two reasons: (1) the image ships
      # ~931M of preloaded control-plane images here (apiserver/etcd/coredns/
      # kindnet) — seeded into the fresh volume on first up; (2) containerd's
      # overlayfs snapshotter cannot run stacked on the container's own overlay
      # rootfs, so it needs a real (volume-backed) filesystem.
      - containerd:/var/lib/containerd
      # etcd data dir on tmpfs → empty RAM-backed dir every `up`. etcd's static
      # pod sets no --initial-cluster-state, so it defaults to `new`: an empty
      # data-dir makes etcd bootstrap a brand-new cluster on each boot. No env
      # var needed (and none would reach the static pod anyway). mode 0700 keeps
      # etcd from warning about over-permissive data-dir perms.
      - type: tmpfs
        target: /var/lib/etcd
        tmpfs:
          mode: 0700
      # kubelet runtime state (pod dirs, plugins, manager checkpoints). The
      # config/flags/pki bind mounts below overlay specific files on top.
      - kubelet:/var/lib/kubelet
      # Container + pod logs kubelet/containerd write here.
      - varlog:/var/log

      # Pre-minted control-plane state pulled from a live kind node:
      #   pki/*               — CA + all leaf certs/keys (SANs pinned to .2)
      #   *.conf              — admin/controller-manager/scheduler/kubelet kubeconfigs
      #   manifests/*.yaml    — static pods kubelet launches: apiserver, etcd,
      #                         controller-manager, scheduler
      # Mounting this means kubelet can bring the control plane up directly from
      # these files — no `kubeadm init` cert-generation pass needed.
      - ./etc-kubernetes:/etc/kubernetes

      # --- kubeadm-less kubelet bring-up ---
      # The kubelet systemd unit (baked into the image, already `enabled`) has
      #   ConditionPathExists=/var/lib/kubelet/config.yaml
      # In a vanilla node that file is absent, so kubelet idles until kubeadm
      # writes it. Mounting it ourselves is what lets kubelet start with NO
      # kubeadm. kubelet then uses the mounted /etc/kubernetes/kubelet.conf
      # (bootstrap-kubelet.conf is intentionally absent → no TLS bootstrap).
      - ./var-lib/kubelet/config.yaml:/var/lib/kubelet/config.yaml
      # KUBELET_KUBEADM_ARGS the systemd drop-in sources: --node-ip / --provider-id.
      - ./var-lib/kubelet/kubeadm-flags.env:/var/lib/kubelet/kubeadm-flags.env
      # kubelet client cert that kubelet.conf points at (…/kubelet-client-current.pem).
      - ./var-lib/kubelet/pki:/var/lib/kubelet/pki

      # --- systemd units: our copies become source of truth ---
      # The image ships+enables these; we bind-mount over them (read-only) so
      # edits here drive the container. Individual file mounts only — mounting
      # the whole /etc/systemd/system dir would shadow the enable symlinks in
      # multi-user.target.wants/ and every other system unit. Those symlinks
      # stay image-side and resolve to these paths, so enablement is preserved.
      - ./etc-systemd/system/kubelet.service:/etc/systemd/system/kubelet.service:ro
      - ./etc-systemd/system/containerd.service:/etc/systemd/system/containerd.service:ro
      - ./etc-systemd/system/kubelet.service.d/10-kubeadm.conf:/etc/systemd/system/kubelet.service.d/10-kubeadm.conf:ro
      - ./etc-systemd/system/kubelet.service.d/11-kind.conf:/etc/systemd/system/kubelet.service.d/11-kind.conf:ro

      # --- addon apply, now an in-node systemd oneshot (was the `addons` service) ---
      # The unit itself, plus a kubelet drop-in (20-apply-addons.conf) that does
      # Wants=apply-addons.service — that is how it gets enabled, since an enable
      # symlink can't be bind-mounted and systemd ignores regular files dropped
      # into multi-user.target.wants/.
      - ./etc-systemd/system/apply-addons.service:/etc/systemd/system/apply-addons.service:ro
      - ./etc-systemd/system/kubelet.service.d/20-apply-addons.conf:/etc/systemd/system/kubelet.service.d/20-apply-addons.conf:ro
      - ./addons:/addons:ro

    ports:
      # API server. Bound to loopback only, same as kind's default.
      - "127.0.0.1:6443:6443"

    restart: on-failure:1

    networks:
      kind:
        # Pin to the address kind's node happened to get (172.18.0.2). This is
        # the IP baked into the harvested certs (SANs), etcd peer/advertise URLs,
        # and kubelet flags — so it must stay fixed. .1 is the bridge gateway,
        # so .2 is the first usable host address.
        ipv4_address: 172.18.0.2

    labels:
      io.x-k8s.kind.cluster: re
      io.x-k8s.kind.role: control-plane

volumes:
  containerd:   # /var/lib/containerd — image store (seeded ~931M from image)
  kubelet:      # /var/lib/kubelet — kubelet runtime state
  varlog:       # /var/log — node + pod logs
  # note: no `etcd` volume — /var/lib/etcd is tmpfs (ephemeral, fresh per `up`)

networks:
  kind:
    name: kind
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
    driver_opts:
      # mtu 65535 is Docker Desktop's loopback default; drop this line on
      # plain dockerd/Linux if the bridge refuses to come up.
      com.docker.network.driver.mtu: "65535"
      com.docker.network.bridge.enable_ip_masquerade: "true"
