# kube-proxy as a static pod (converted from minikube's kube-proxy DaemonSet).
# Baked into the kubelet image stage, so EVERY node — control plane and generic workers —
# runs it from its static-pod path. Authenticates as CN=system:kube-proxy (dedicated cert
# kubeconfig from gen-pki.sh) bound to the auto-bootstrapped system:node-proxier role by an
# addon CRB; expect brief 403 retries on cold boot until apply-addons lands the binding.
apiVersion: v1
kind: Pod
metadata:
  name: kube-proxy
  namespace: kube-system
  labels:
    k8s-app: kube-proxy
    tier: node
spec:
  priorityClassName: system-node-critical
  hostNetwork: true
  tolerations:
    - operator: Exists
  containers:
    - name: kube-proxy
      image: registry.k8s.io/kube-proxy:v1.35.1
      imagePullPolicy: IfNotPresent
      command:
        - /usr/local/bin/kube-proxy
        - --config=/var/lib/kube-proxy/config.conf
        - --hostname-override=$(NODE_NAME)
      env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      securityContext:
        privileged: true
      volumeMounts:
        - name: kube-proxy-config
          mountPath: /var/lib/kube-proxy/config.conf
          readOnly: true
        - name: kubeconfig
          mountPath: /etc/kubernetes/kube-proxy.conf
          readOnly: true
        - name: xtables-lock
          mountPath: /run/xtables.lock
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
  volumes:
    - name: kube-proxy-config
      hostPath:
        path: /etc/kubernetes/kube-proxy/config.conf
        type: File
    - name: kubeconfig
      hostPath:
        path: /etc/kubernetes/kube-proxy.conf
        type: File
    - name: xtables-lock
      hostPath:
        path: /run/xtables.lock
        type: FileOrCreate
    - name: lib-modules
      hostPath:
        path: /lib/modules
        type: ""
