! FRR — the "top-of-rack router" for the kubecompose lab. Dual-homed on both docker
! bridges (192.168.49.254 + 192.168.58.254), so every hop to/from it is intra-bridge and
! docker's inter-bridge isolation never applies. Each node runs its own FRR (the frr-node
! DaemonSet, AS 65001) that advertises the node's podCIDR here and installs what it learns.
!
! Nothing node-specific lives here:
!   bgp listen range        dynamic neighbors — any node on either bridge may peer,
!                           no per-node neighbor lines to maintain
!   redistribute connected  advertises both bridge subnets to the nodes, so cross-bridge
!                           node reachability (kubelet API) is learned, not hardcoded
!   as-override             all nodes share AS 65001; rewriting the path on re-advertise
!                           keeps podCIDRs from tripping eBGP AS-path loop detection
frr defaults traditional
hostname frr
log stdout
!
router bgp 65000
 bgp router-id 192.168.49.254
 ! eBGP without explicit inbound route-maps (lab): accept everything
 no bgp ebgp-requires-policy
 neighbor NODES peer-group
 neighbor NODES remote-as 65001
 neighbor NODES timers 3 9
 bgp listen range 192.168.0.0/16 peer-group NODES
 !
 address-family ipv4 unicast
  neighbor NODES activate
  neighbor NODES as-override
  ! advertise the bridge subnets only (never lo etc.)
  redistribute connected route-map BRIDGES-ONLY
 exit-address-family
!
ip prefix-list BRIDGES seq 5 permit 192.168.0.0/16 le 24
!
route-map BRIDGES-ONLY permit 10
 match ip address prefix-list BRIDGES
!
line vty
