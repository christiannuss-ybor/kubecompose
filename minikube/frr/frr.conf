! FRR — the "top-of-rack router" for the kubecompose lab. Dual-homed on both docker
! bridges (192.168.49.254 + 192.168.58.254), so every hop to/from it is intra-bridge and
! docker's inter-bridge isolation never applies. Each cilium node runs BGP (AS 65001) and
! advertises its podCIDR here (AS 65000); zebra installs the learned routes and the kernel
! forwards between the two legs.
frr defaults traditional
hostname frr
log stdout
!
router bgp 65000
 bgp router-id 192.168.49.254
 ! eBGP without explicit route-maps (lab): accept/advertise everything
 no bgp ebgp-requires-policy
 neighbor NODES peer-group
 neighbor NODES remote-as 65001
 neighbor NODES timers 3 9
 neighbor 192.168.49.2 peer-group NODES
 neighbor 192.168.49.3 peer-group NODES
 neighbor 192.168.58.2 peer-group NODES
 !
 address-family ipv4 unicast
  neighbor NODES activate
 exit-address-family
!
line vty
