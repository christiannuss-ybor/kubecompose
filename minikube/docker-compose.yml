# Kubeadm-less minikube-equivalent, reverse-engineered from a `minikube start --driver=docker
# --cni=cilium` node (originally docker inspect e0c9f39c448f). kicbase runs systemd (/sbin/init)
# as PID 1; the whole cluster comes up from static-pod manifests + systemd units + an addon-apply
# oneshot — no kubeadm. Source of truth lives in this directory and is baked into the image by
# ./Dockerfile (COPY). Compose supplies only mutable runtime state (volumes, tmpfs) + the network.
services:
  minikube:
    build:
      context: .
      dockerfile: Dockerfile
      target: full
    image: kubecompose/minikube:v1.35.1
    container_name: minikube
    hostname: minikube
    privileged: true
    restart: "no"
    tty: true                       # Config.Tty=true
    stop_signal: SIGRTMIN+3         # systemd graceful shutdown
    stop_grace_period: 1s           # StopTimeout=1
    cgroup: private                 # CgroupnsMode=private
    # NanoCpus=2e9, Memory=MemorySwap=4194304000 (swap == mem -> swap disabled)
    cpus: 2
    mem_limit: 4194304000
    memswap_limit: 4194304000
    shm_size: 67108864              # 64MB
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - label=disable
    tmpfs:
      - /run
      - /tmp
      # ephemeral etcd: data-dir is /var/lib/minikube/etcd (etcd static-pod --data-dir,
      # hostPath-mounted into the pod). tmpfs here => brand-new DB every `up`.
      - /var/lib/minikube/etcd:mode=0700
    # kubelet.conf + controller-manager.conf address the apiserver as
    # control-plane.minikube.internal; minikube injects this into the node's /etc/hosts.
    extra_hosts:
      - "control-plane.minikube.internal:192.168.49.2"
    environment:
      container: docker
      # cilium on/off toggle, consumed by apply-addons.service (default on; see Dockerfile).
      # Usage: CILIUM=off make minikube
      CILIUM: ${CILIUM:-on}
    labels:
      created_by.minikube.sigs.k8s.io: "true"
      mode.minikube.sigs.k8s.io: minikube
      name.minikube.sigs.k8s.io: minikube
      role.minikube.sigs.k8s.io: ""
    volumes:
      # Source files are baked into the image (see ./Dockerfile). Only mutable runtime state
      # lives here. Surgical named volumes (was blanket `minikube:/var`): the inner runtime
      # needs a real fs (overlayfs-on-overlayfs breaks containerd/docker); empty named volumes
      # seed from the image on first `up`, so baked images (+ kubelet config/pki) survive.
      - containerd:/var/lib/containerd   # image store (containerd snapshotter) — the big one
      - dockerd:/var/lib/docker          # docker metadata / volumes / network state
      - kubelet:/var/lib/kubelet         # kubelet runtime state (seeded with baked config.yaml + pki)
      - varlog:/var/log
      - /lib/modules:/lib/modules:ro     # host kernel modules (only non-baked mount)
    # apiserver only, pinned to a stable host port so a committed kubeconfig always works.
    # minikube also published 22/2376/5000/32443 for its host->node docker API + registry;
    # we drive the cluster from inside the container, so drop them.
    ports:
      - "127.0.0.1:8443:8443"
    # DUAL-HOMED: the control-plane node sits on both bridges — it hosts the "top-of-rack
    # router" (the frr-node chart's ToR Deployment, pinned here via the AKS-style system
    # node label), which claims .254 secondary addresses on both interfaces and forwards
    # between the bridge legs. Every node's hop to/from the ToR stays intra-bridge.
    networks:
      minikube-cloud:
        ipv4_address: 192.168.49.2
      minikube-onprem:
        ipv4_address: 192.168.58.3

  # generic worker node — the `kubelet` image stage. Same base/runtime chain, but no control
  # plane, no admin credentials, no signing keys: just kubelet (which joins via TLS
  # bootstrapping) and the kube-proxy static pod. Hostname is its node name; IP auto-detected.
  minikube-m02:
    build:
      context: .
      dockerfile: Dockerfile
      target: kubelet
    image: kubecompose/minikube-kubelet:v1.35.1
    container_name: minikube-m02
    hostname: minikube-m02
    privileged: true
    restart: "no"
    tty: true
    stop_signal: SIGRTMIN+3
    stop_grace_period: 1s
    cgroup: private
    cpus: 2
    mem_limit: 4194304000
    memswap_limit: 4194304000
    shm_size: 67108864
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - label=disable
    tmpfs:
      - /run
      - /tmp
    extra_hosts:
      - "control-plane.minikube.internal:192.168.49.2"
    environment:
      container: docker
    depends_on:
      - minikube
    volumes:
      - containerd-m02:/var/lib/containerd
      - dockerd-m02:/var/lib/docker
      - kubelet-m02:/var/lib/kubelet
      - varlog-m02:/var/log
      - /lib/modules:/lib/modules:ro
    networks:
      minikube-cloud:
        ipv4_address: 192.168.49.3

  minikube-m03:
    build:
      context: .
      dockerfile: Dockerfile
      target: kubelet
    image: kubecompose/minikube-kubelet:v1.35.1
    container_name: minikube-m03
    hostname: minikube-m03
    privileged: true
    restart: "no"
    tty: true
    stop_signal: SIGRTMIN+3
    stop_grace_period: 1s
    cgroup: private
    cpus: 2
    mem_limit: 4194304000
    memswap_limit: 4194304000
    shm_size: 67108864
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - label=disable
    tmpfs:
      - /run
      - /tmp
    extra_hosts:
      - "control-plane.minikube.internal:192.168.49.2"
    environment:
      container: docker
    depends_on:
      - minikube
    volumes:
      - containerd-m03:/var/lib/containerd
      - dockerd-m03:/var/lib/docker
      - kubelet-m03:/var/lib/kubelet
      - varlog-m03:/var/log
      - /lib/modules:/lib/modules:ro
    # EXPERIMENT: m03 is the "on-prem" node — a different docker bridge than the rest of
    # the cluster. Docker isolates bridge networks from each other by default
    # (DOCKER-ISOLATION iptables), standing in for the WAN between cloud and on-prem.
    networks:
      minikube-onprem:
        ipv4_address: 192.168.58.2

networks:
  minikube-cloud:
    name: minikube-cloud
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 192.168.49.0/24
          gateway: 192.168.49.1
    driver_opts:
      com.docker.network.driver.mtu: "65535"
      com.docker.network.bridge.enable_ip_masquerade: "true"
  minikube-onprem:
    name: minikube-onprem
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 192.168.58.0/24
          gateway: 192.168.58.1
    driver_opts:
      com.docker.network.driver.mtu: "65535"
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  containerd:
  dockerd:
  kubelet:
  varlog:
  containerd-m02:
  dockerd-m02:
  kubelet-m02:
  varlog-m02:
  containerd-m03:
  dockerd-m03:
  kubelet-m03:
  varlog-m03:
