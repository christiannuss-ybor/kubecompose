{{- if .Values.kubeProxy.enabled }}
# kube-proxy for AKS Flex Nodes. The cluster runs cilium kube-proxy-replacement (no kube-proxy
# DaemonSet), and flex nodes run neither cilium nor kube-proxy — so service VIPs (10.0.0.1
# apiserver, 10.0.0.10 kube-dns, ...) don't resolve on a flex node. This DaemonSet runs
# kube-proxy on flex nodes ONLY (nodeSelector managed=false), programming the service DNAT
# locally. It dials the apiserver by FQDN, NOT the 10.0.0.1 VIP it's about to program
# (chicken/egg); that FQDN is public and reachable via the instance's default route.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-kube-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-kube-proxy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-kube-proxy
  labels:
    app: {{ .Release.Name }}-kube-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:node-proxier
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-kube-proxy
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kube-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-kube-proxy
data:
  # Dial the apiserver by FQDN with the pod's SA token — not the 10.0.0.1 VIP kube-proxy is
  # about to create.
  kubeconfig.conf: |
    apiVersion: v1
    kind: Config
    clusters:
      - name: default
        cluster:
          certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          server: https://{{ required "kubeProxy.apiServerHost is required" .Values.kubeProxy.apiServerHost }}:443
    users:
      - name: default
        user:
          tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    contexts:
      - name: default
        context:
          cluster: default
          namespace: {{ .Release.Namespace }}
          user: default
    current-context: default
  config.conf: |
    apiVersion: kubeproxy.config.k8s.io/v1alpha1
    kind: KubeProxyConfiguration
    mode: "iptables"
    clusterCIDR: "{{ .Values.kubeProxy.clusterCidr }}"
    clientConnection:
      kubeconfig: /var/lib/kube-proxy/kubeconfig.conf
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-kube-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-kube-proxy
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-kube-proxy
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-kube-proxy
    spec:
      serviceAccountName: {{ .Release.Name }}-kube-proxy
      hostNetwork: true
      priorityClassName: system-node-critical
      {{- with .Values.kubeProxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kubeProxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kube-proxy
          image: "{{ .Values.kubeProxy.image }}"
          command:
            - /usr/local/bin/kube-proxy
            - --config=/var/lib/kube-proxy/config.conf
            - --hostname-override=$(NODE_NAME)
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - { name: config, mountPath: /var/lib/kube-proxy, readOnly: true }
            - { name: xtables-lock, mountPath: /run/xtables.lock }
            - { name: lib-modules, mountPath: /lib/modules, readOnly: true }
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-kube-proxy
        - name: xtables-lock
          hostPath:
            path: /run/xtables.lock
            type: FileOrCreate
        - name: lib-modules
          hostPath:
            path: /lib/modules
{{- end }}
