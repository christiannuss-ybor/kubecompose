# ybor-playground-dev-westus2 (AKS) profile — the cluster-specific route server addresses
# (Azure Route Server's two virtualRouterIps). Everything else uses the chart defaults
# (ASN 65001/65515, system-pool placement, NodeNetworkConfig discovery).
routeServer:
  addresses:
    - 10.225.255.36
    - 10.225.255.37

# kube-proxy on the flex node so service VIPs (10.0.0.1 apiserver, 10.0.0.10 kube-dns) resolve
# there. apiServerHost = this cluster's apiserver FQDN.
kubeProxy:
  enabled: true
  apiServerHost: "ybor-playground-dev-westus2-21x49g9f.hcp.westus2.azmk8s.io"
