# Route Server for Kubernetes — a per-node FRR BGP speaker (DaemonSet) that advertises
# each node's pod CIDR to an external route server (e.g. Azure Route Server), so the pod
# network becomes routable off-cluster. Pod CIDR is discovered from Azure's
# NodeNetworkConfig; the speaker peers the route server's addresses over eBGP.
#
# (An earlier version also shipped an in-cluster "built-in" route server for the docker
# lab; that's been removed pending a rethink — this chart is currently AKS-shaped.)

asn: 65001                       # ASN shared by the node speakers

# The external route server the speakers peer (Azure Route Server: ASN 65515, its two
# virtualRouterIps). addresses is empty by default — supply per cluster (see the
# ybor-playground profile).
routeServer:
  asn: 65515
  addresses: []                  # e.g. [10.225.255.36, 10.225.255.37]

# Target the real VMSS system pool deterministically: mode=system AND not Karpenter.
# (Karpenter's default nodepool is mostly mode=user but demand-provisions a few mode=system
# nodes for system-selecting workloads; those are ephemeral and excluded here. Both labels
# are AKS-managed and survive a pool resize — unlike the agentpool name, which carries a
# generated suffix.) The CriticalAddonsOnly toleration lets it land on the tainted system
# node, matching the AKS system-add-on pattern.
speaker:
  nodeSelector: {}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - { key: kubernetes.azure.com/mode, operator: In, values: ["system"] }
              - { key: karpenter.sh/nodepool, operator: DoesNotExist }
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists

timers:
  keepalive: 3
  holdtime: 9

# debug: true adds a cnuss/dev sidecar (sleep infinity) to each speaker pod, sharing the
# pod netns + the config/etc-frr/work volumes and the frr caps — exec in to poke at BGP,
# the rendered frr.conf, and the discovered pod CIDR. Off by default.
debug: false

# kube-proxy for AKS Flex Nodes (kube-proxy.yaml). Off by default. Enable per cluster and set
# apiServerHost to the cluster's apiserver FQDN — kube-proxy dials it directly, since the
# 10.0.0.1 service VIP it programs isn't reachable until it's running.
kubeProxy:
  enabled: false
  image: registry.k8s.io/kube-proxy:v1.33.8
  apiServerHost: ""              # e.g. <cluster>-xxxxxxxx.hcp.<region>.azmk8s.io
  clusterCidr: 192.168.0.0/16    # AKS pod-CIDR aggregate
  nodeSelector:
    kubernetes.azure.com/managed: "false"
  tolerations:
    - operator: Exists

# Single-purpose tool images. Repositories are hardcoded in the templates
# (quay.io/frrouting/frr, gomplate/gomplate, and bitnami/kubectl:latest for the NNC
# lookup — Bitnami moved version tags behind Bitnami Secure Images, so kubectl has no
# knob). Bump the versions here.
tooling:
  frr:
    version: "10.2.1"
  gomplate:
    version: "stable"

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi
