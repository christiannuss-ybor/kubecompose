# kube-proxy for AKS Flex Nodes (see Chart.yaml). Runs on flex nodes ONLY
# (nodeSelector managed=false) and dials the apiserver by FQDN — NOT the 10.0.0.1 VIP it is
# about to program (chicken/egg); that FQDN is public and reachable via the node's default
# route. Set apiServerHost per cluster in a values-<cluster>.yaml overlay.

image: registry.k8s.io/kube-proxy:v1.33.8
apiServerHost: ""              # e.g. <cluster>-xxxxxxxx.hcp.<region>.azmk8s.io
clusterCidr: 192.168.0.0/16    # AKS pod-CIDR aggregate

# Flex nodes are the only non-AKS-managed nodes, so managed=false selects them precisely.
# tolerations Exists lets kube-proxy land regardless of any flex-node taints.
nodeSelector:
  kubernetes.azure.com/managed: "false"
tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi

# Optionally expose kube-dns as a MetalLB BGP LoadBalancer VIP so the flex node can resolve
# cluster DNS WITHOUT a route to CoreDNS pod IPs (unreachable across the interconnect). The
# flex node points its kubelet ClusterDNS at this VIP: flex -> VIP -> speaker node -> Cilium
# kube-proxy-replacement DNATs -> CoreDNS pod (any node, cluster-sourced -> reachable).
#
# Requires the metallb-bgp chart (MetalLB frr-k8s + RS peering) already installed. The pool +
# advertisement are created in MetalLB's namespace (metallbNamespace) so MetalLB sees them;
# the VIP is a dedicated reserved /32 (autoAssign:false) that only this service claims.
dnsVip:
  enabled: false
  address: "10.1.0.10"               # reserved /32; mirrors the in-cluster 10.0.0.10
  loadBalancerClass: metallb.ybor.ai/bgp
  metallbNamespace: metallb-system   # where MetalLB reads IPAddressPool/BGPAdvertisement CRs
  poolName: flex-dns
