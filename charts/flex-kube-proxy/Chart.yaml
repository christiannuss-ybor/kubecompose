apiVersion: v2
name: flex-kube-proxy
description: >-
  Flex-node cluster-networking helpers (rebrand pending). (1) kube-proxy on flex nodes only
  (nodeSelector kubernetes.azure.com/managed=false), programming service DNAT locally since the
  cluster runs Cilium kube-proxy-replacement and flex nodes run neither Cilium nor kube-proxy.
  (2) A self-hosted CoreDNS pinned to the reachable managed system VMSS pool, fronted by a pinned
  ClusterIP the flex nodes use as --cluster-dns — the managed kube-dns endpoints spread onto
  Karpenter nodes that a cross-cloud flex node can't reach (no NIC IP-forwarding).
type: application
version: 0.2.0
appVersion: "1.33.8"
