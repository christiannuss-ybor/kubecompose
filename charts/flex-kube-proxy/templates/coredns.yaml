{{- if .Values.coredns.enabled }}
# Self-hosted CoreDNS for the AKS Flex Nodes. AKS-managed kube-dns (10.0.0.10) load-balances
# across CoreDNS pods that spread onto Karpenter nodes, whose NICs lack enableIpForwarding and
# are therefore unreachable from a cross-cloud flex node (Azure SDN drops the raw, unencapsulated
# overlay-dst packets that the Route Server injection produces). This CoreDNS is pinned to the
# managed system VMSS pool — the only nodes a flex node can reach — and fronted by a pinned
# ClusterIP the flex nodes use as --cluster-dns. It answers cluster.local from an apiserver watch
# (kubernetes plugin), so it needs no in-cluster CoreDNS reachability.
#
# Deliberately NOT labelled k8s-app=kube-dns: keeps the managed kube-dns Service from selecting
# these pods and the AKS coredns-autoscaler (targets deployment/coredns by name) from touching them.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-coredns
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-coredns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-coredns
  labels:
    app: {{ .Release.Name }}-coredns
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services", "pods", "namespaces"]
    verbs: ["list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-coredns
  labels:
    app: {{ .Release.Name }}-coredns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-coredns
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-coredns
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-coredns
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-coredns
data:
  # Mirrors the managed AKS Corefile minus the `import custom/*` lines (need AKS's coredns-custom
  # ConfigMap) and the internal.cloudapp.net/reddog NXDOMAIN templates (legacy-domain suppression).
  Corefile: |
    .:53 {
        errors
        health {
          lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
        }
        prometheus :9153
        forward . /etc/resolv.conf
        cache 30
        loop
        reload
        loadbalance
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-coredns
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-coredns
    k8s-app: {{ .Release.Name }}-coredns
spec:
  replicas: {{ .Values.coredns.replicas }}
  selector:
    matchLabels:
      k8s-app: {{ .Release.Name }}-coredns
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-coredns
        k8s-app: {{ .Release.Name }}-coredns
    spec:
      serviceAccountName: {{ .Release.Name }}-coredns
      priorityClassName: system-cluster-critical
      # Default dnsPolicy so CoreDNS forwards `. /etc/resolv.conf` = the system node's Azure DNS,
      # exactly like the managed CoreDNS does.
      dnsPolicy: Default
      {{- with .Values.coredns.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        # Run only on nodes a flex node can reach = nodes NOT provisioned by Karpenter (Karpenter/NAP
        # node NICs lack enableIpForwarding, so Azure SDN drops the raw overlay-dst packets the Route
        # Server injects). Karpenter stamps every node it makes with this label; the managed system VMSS
        # pool does not. Flex nodes also lack it, but their flexnode NoSchedule taint (untolerated here)
        # keeps CoreDNS off them.
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ .Values.coredns.excludeKarpenterLabelKey }}
                    operator: DoesNotExist
        # Spread replicas across reachable system nodes when more than one exists.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    k8s-app: {{ .Release.Name }}-coredns
      containers:
        - name: coredns
          image: "{{ .Values.coredns.image }}"
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - { containerPort: 53, name: dns, protocol: UDP }
            - { containerPort: 53, name: dns-tcp, protocol: TCP }
            - { containerPort: 9153, name: metrics, protocol: TCP }
            - { containerPort: 8080, name: health, protocol: TCP }
            - { containerPort: 8181, name: ready, protocol: TCP }
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /ready, port: 8181 }
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add: ["NET_BIND_SERVICE"]
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.coredns.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-coredns
            items:
              - key: Corefile
                path: Corefile
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-coredns
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-coredns
    k8s-app: {{ .Release.Name }}-coredns
spec:
  type: ClusterIP
  clusterIP: {{ required "coredns.clusterIP is required (a free IP in the service CIDR)" .Values.coredns.clusterIP | quote }}
  selector:
    k8s-app: {{ .Release.Name }}-coredns
  ports:
    - name: dns
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
{{- end }}
