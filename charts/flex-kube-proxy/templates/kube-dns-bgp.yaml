{{- if .Values.dnsVip.enabled }}
# Reserve the DNS VIP as a dedicated /32 pool. autoAssign:false so MetalLB only hands it to a
# service that explicitly requests it (the kube-dns-bgp Service below), never to a random LB.
# Created in MetalLB's namespace so the MetalLB controller reads it.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .Values.dnsVip.poolName }}
  namespace: {{ .Values.dnsVip.metallbNamespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  addresses:
    - {{ .Values.dnsVip.address }}/32
  autoAssign: false
---
# Advertise the reserved pool as a /32 to the Route Server (via the existing metallb-bgp
# BGPPeers — no peers list = all peers).
apiVersion: metallb.io/v1beta1
kind: BGPAdvertisement
metadata:
  name: {{ .Values.dnsVip.poolName }}
  namespace: {{ .Values.dnsVip.metallbNamespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  ipAddressPools:
    - {{ .Values.dnsVip.poolName }}
  aggregationLength: 32
---
# kube-dns exposed as a BGP-advertised LoadBalancer VIP. Selects the CoreDNS pods (same
# namespace as this Service), pinned to the reserved VIP via the MetalLB annotations. Point
# the flex node's kubelet ClusterDNS at .Values.dnsVip.address.
apiVersion: v1
kind: Service
metadata:
  name: kube-dns-bgp
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
  annotations:
    metallb.universe.tf/loadBalancerIPs: "{{ .Values.dnsVip.address }}"
    metallb.universe.tf/address-pool: {{ .Values.dnsVip.poolName }}
spec:
  type: LoadBalancer
  loadBalancerClass: {{ .Values.dnsVip.loadBalancerClass }}
  selector:
    k8s-app: kube-dns
  ports:
    - { name: dns,     port: 53, targetPort: 53, protocol: UDP }
    - { name: dns-tcp, port: 53, targetPort: 53, protocol: TCP }
{{- end }}
