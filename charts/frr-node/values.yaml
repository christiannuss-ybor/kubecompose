# BGP identity
asn: 65001        # every node shares this ASN; the ToR does as-override so
                  # re-advertised podCIDRs survive eBGP AS-path loop detection
peerAsn: 65000    # the top-of-rack FRR

# BGP router-id. Empty = each node uses its own IP (downward API) — the sane
# default for a DaemonSet, since router-ids must be unique per speaker.
routerId: ""

# Peer discovery convention: the ToR lives at .<torSuffix> of each node's /24,
# rendered into frr.conf at pod start from the node IP.
torSuffix: 254

timers:
  keepalive: 3
  holdtime: 9

# The "top-of-rack router" itself — a Deployment pinned to the system node (the
# dual-homed control-plane box, labeled AKS-style by its kubelet). It claims the
# .<torSuffix> secondary address on every eth* interface and forwards between the
# bridge legs. The speaker DaemonSet anti-affinities away from this label: the ToR
# doubles as that node's speaker (same netns — one bgpd per node, port 179).
tor:
  nodeSelector:
    kubernetes.azure.com/mode: system
  # dynamic-neighbor acceptance + the connected-subnet advertise filter
  listenRange: 192.168.0.0/16

# No pod-CIDR knob and no discovery: the podCIDR is defined structurally as "the
# aggregate kernel route on the CNI's interface" (see the route-map in the
# ConfigMap). Whatever CIDR the CNI programs there gets advertised.
podCidrInterface: cilium_host

image:
  repository: quay.io/frrouting/frr
  tag: 10.2.1

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi
