# The "top-of-rack router" as a cluster workload, pinned to the system node — the
# dual-homed control-plane box (compose puts it on both bridges; its kubelet self-labels
# AKS-style). The pod claims .{{ .Values.torSuffix }} as a secondary address on every
# eth* interface (eth* only — never cilium_host, that would squat in the pod range),
# so the nodes' "ToR at .{{ .Values.torSuffix }} of my /24" convention holds on every
# bridge, and the kernel forwards between the legs.
#
# Recreate strategy: two ToR pods would race for host port 179 during a rolling update.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-tor
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-tor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-tor
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-tor
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      nodeSelector:
        {{- toYaml .Values.tor.nodeSelector | nindent 8 }}
      tolerations:
        - operator: Exists
      containers:
        - name: frr
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW", "NET_BIND_SERVICE", "SYS_ADMIN"]
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          command:
            - sh
            - -c
            - |
              ip -4 -o addr show scope global | awk '$2 ~ /^eth/ {print $2, $4}' \
                | while read dev cidr; do
                  ip addr replace "${cidr%.*}.{{ .Values.torSuffix }}/24" dev "$dev"
                  echo "tor: claimed ${cidr%.*}.{{ .Values.torSuffix }}/24 on $dev"
                done
              cp /config/daemons /etc/frr/daemons
              sed -e "s/__HOST_IP__/$HOST_IP/g" \
                /config/tor-frr.conf.tpl > /etc/frr/frr.conf
              echo "tor: router-id $HOST_IP listening for {{ .Values.tor.listenRange }}"
              exec /usr/lib/frr/docker-start
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}
