{{- /*
One BGPPeer per Route Server virtualRouterIp. frr-k8s (on the pinned speaker nodes)
opens an eBGP session to each. ebgpMultiHop lets the session form across the VNet hop to
the RouteServerSubnet. The RS must also be configured with a matching BGP peering per
speaker-node IP (Azure side) for these to establish.
*/ -}}
{{- range $i, $addr := .Values.routeServer.addresses }}
---
apiVersion: metallb.io/v1beta2
kind: BGPPeer
metadata:
  name: route-server-{{ $i }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $.Release.Name }}
spec:
  myASN: {{ $.Values.localAsn }}
  peerASN: {{ $.Values.routeServer.asn }}
  peerAddress: {{ $addr }}
  ebgpMultiHop: {{ $.Values.ebgpMultiHop }}
{{- end }}
