apiVersion: v2
name: flex-node-system
description: >-
  System-side support for AKS Flex (cross-cloud) nodes, in one chart: a combined system-node pod
  (FRR Route-Server relay + CoreDNS, hostNetwork, bound to the node IP) that flex nodes depend on,
  plus a kube-proxy DaemonSet that runs on the flex nodes themselves. Merges the former bgp +
  flex-kube-proxy charts. Optionally runs a Headscale control server (system.headscale.enabled) for
  the cross-cloud WireGuard overlay (YP6M-3040).
type: application
version: 0.2.0
appVersion: "1.33.8"
