# Rendered at two levels: helm fills the static knobs (ASN, RS peers) at package time; the
# prepare-config init container then sed-substitutes the per-node values at pod start —
# __ROUTER_ID__ / __HOST_IP__ (both the node IP, from the downward API) and __POD_CIDR__ (the /24
# discover-podcidr read from NodeNetworkConfig). Placeholders are __UPPERCASE__ so they never
# collide with helm's Go-template braces.
#
# Corefile.tpl is always present; the FRR keys (daemons, speaker.conf.tpl) only render when the FRR
# relay is enabled (asn + routeServer.addresses set).
{{- $frr := include "flex-node-system.frrEnabled" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
data:
  {{- if $frr }}
  daemons: |
    # FRR daemons to launch. zebra always runs; we only add bgpd.
    bgpd=yes
    ospfd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    pim6d=no
    ldpd=no
    nhrpd=no
    eigrpd=no
    babeld=no
    sharpd=no
    pbrd=no
    bfdd=no
    fabricd=no
    vrrpd=no
    pathd=no

    vtysh_enable=yes
    zebra_options="  -A 127.0.0.1 -s 90000000"
    bgpd_options="   -A 127.0.0.1"
  # FRR relay: advertise THIS node's own pod /24 (__POD_CIDR__) to the Route Server over eBGP,
  # next-hop left as the node IP (__ROUTER_ID__) so the RS injects "that /24 -> this node" into the
  # VNet. RS-OUT is a belt-and-suspenders filter: only an AKS pod /24 may leave toward the RS. No
  # iBGP mesh — the relay peers nothing but the Route Server.
  speaker.conf.tpl: |
    frr defaults traditional
    log stdout
    !
    ! only an AKS pod /24 may be advertised to the Route Server (its next-hop is this in-VNet
    ! system node); nothing else should ever leak toward the RS.
    ip prefix-list RS-PODS seq 5 permit 192.168.0.0/16 le 24
    route-map RS-OUT permit 10
     match ip address prefix-list RS-PODS
    !
    router bgp {{ .Values.asn }}
     bgp router-id __ROUTER_ID__
     no bgp ebgp-requires-policy
     no bgp network import-check
    {{- range .Values.routeServer.addresses }}
     neighbor {{ . }} remote-as {{ $.Values.routeServer.asn }}
     neighbor {{ . }} ebgp-multihop
    {{- end }}
     !
     address-family ipv4 unicast
      network __POD_CIDR__
    {{- range .Values.routeServer.addresses }}
      neighbor {{ . }} activate
      neighbor {{ . }} attribute-unchanged next-hop
      neighbor {{ . }} route-map RS-OUT out
    {{- end }}
     exit-address-family
    !
    line vty
  {{- end }}
  # CoreDNS: mirrors the managed AKS Corefile minus `import custom/*` (needs AKS's coredns-custom
  # ConfigMap) and the internal.cloudapp.net/reddog NXDOMAIN templates — PLUS `bind __HOST_IP__`.
  # The pod is hostNetwork (FRR needs it), so CoreDNS MUST bind the node IP specifically: a wildcard
  # :53 would collide with systemd-resolved's 127.0.0.53:53 on the node. Binding the node IP makes
  # the Service endpoints the node IP, so flex nodes reach DNS over the node-to-node VPN. Answers
  # cluster.local from an apiserver watch (kubernetes plugin), so it needs no in-cluster reachability.
  Corefile.tpl: |
    .:53 {
        bind __HOST_IP__
        errors
        health {
          lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
        }
        prometheus :9153
        forward . /etc/resolv.conf
        cache 30
        loop
        reload
        loadbalance
    }
  {{- if .Values.system.headscale.enabled }}
  # Headscale control-server config for the cross-cloud WireGuard overlay (YP6M-3040). Rendered by
  # prepare-config, which seds __HOST_IP__ (the node IP) into server_url + the listen addrs so the
  # server rides the node-to-node VPN and flex nodes can register in a later iteration. Schema tracks
  # headscale v0.29.2 (config-example.yaml). ITERATION 1: run `serve` — no TLS / pre-auth keys / agents.
  headscale.yaml.tpl: |
    server_url: http://__HOST_IP__:{{ .Values.system.headscale.httpPort }}
    listen_addr: __HOST_IP__:{{ .Values.system.headscale.httpPort }}
    metrics_listen_addr: __HOST_IP__:{{ .Values.system.headscale.metricsPort }}
    grpc_listen_addr: __HOST_IP__:{{ .Values.system.headscale.grpcPort }}
    grpc_allow_insecure: false

    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    # Tailnet address pool (the 100.x overlay IPs headscale hands nodes) — distinct from the pod
    # CIDRs those nodes will later advertise as subnet routes. Defaults are fine.
    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential

    # Headscale refuses to start with an empty DERPMap. Rather than phone home to Tailscale's public
    # relays (derp.urls), run the EMBEDDED DERP: automatically_add_embedded_derp_region builds one
    # region from server_url (the node IP). We have direct node-IP reachability over the VPN, so DERP
    # never actually relays data — this just satisfies the startup check and bootstraps peers.
    derp:
      server:
        enabled: true
        region_id: 999
        region_code: headscale
        region_name: "Headscale Embedded DERP"
        stun_listen_addr: "0.0.0.0:3478"
        private_key_path: /var/lib/headscale/derp_server_private.key
        automatically_add_embedded_derp_region: true
      urls: []
      paths: []
      auto_update_enabled: false
      update_frequency: 24h

    disable_check_updates: true

    node:
      ephemeral:
        inactivity_timeout: 30m

    database:
      type: sqlite
      sqlite:
        path: /var/lib/headscale/db.sqlite
        write_ahead_log: true

    # MagicDNS off: flex nodes already use this chart's CoreDNS (--cluster-dns 10.0.0.100); we don't
    # want headscale pushing its own resolver to clients.
    dns:
      magic_dns: false
      base_domain: flex.ybor.internal
      override_local_dns: false
      nameservers:
        global: []

    log:
      level: info
  {{- end }}
