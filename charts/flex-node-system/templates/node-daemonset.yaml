# The flex-node DaemonSet (<release>-flex-node) + kube-proxy's ConfigMap. Its workload container is
# kube-proxy; when the top-level `debug` flag is true, a cnuss/dev toolbox sidecar (sleep infinity)
# is also added as containers[0] for on-node debugging. A SEPARATE NVIDIA device-plugin DaemonSet
# (+ RuntimeClass) is always rendered here too, but self-targets GPU flex nodes via its nodeSelector
# (schedules nothing where there's no GPU node) — see the gpu.* block at the bottom of this file.
#
# kube-proxy on the flex nodes ONLY (nodeSelector managed=false): programs the service DNAT locally
# so in-cluster pods on a flex node can reach ClusterIP services. Dials the apiserver by FQDN
# (public, reachable via the node's default route), NOT the 10.0.0.1 VIP it is about to program.
# Reuses the cilium ServiceAccount (kubeProxy.serviceAccountName) — no SA/RBAC created here.
#
# The apiserver FQDN is not hardcoded: a busybox init (kubeProxy.initImage) renders kubeconfig.conf
# at pod start, taking the host from kubeProxy.apiServerHost, or — when that's empty — inferring it
# from the pod's own SA token `aud` claim (AKS puts the apiserver FQDN in the token audience). The
# kube-proxy image itself is too minimal to decode the token (no base64/sed/cut/tr), hence the init.
{{- $clusterCidr := include "flex-node-system.clusterCidr" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kube-proxy
  namespace: kube-system
  labels:
    app: {{ .Release.Name }}-kube-proxy
data:
  # kube-proxy config. Points at the kubeconfig the init renders into the shared emptyDir.
  config.conf: |
    apiVersion: kubeproxy.config.k8s.io/v1alpha1
    kind: KubeProxyConfiguration
    mode: "iptables"
    clusterCIDR: {{ $clusterCidr | default "192.168.0.0/16" | quote }}
    clientConnection:
      kubeconfig: /etc/kube-proxy/kubeconfig.conf
  # kubeconfig TEMPLATE — __APISERVER_HOST__ is filled at pod start by the init (see above). Dials
  # the apiserver by FQDN with the pod's SA token; no static creds (tokenFile + the projected CA).
  kubeconfig.conf.tpl: |
    apiVersion: v1
    kind: Config
    clusters:
      - name: default
        cluster:
          certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          server: https://__APISERVER_HOST__:443
    users:
      - name: default
        user:
          tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    contexts:
      - name: default
        context:
          cluster: default
          namespace: kube-system
          user: default
    current-context: default
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-flex-node
  namespace: kube-system
  labels:
    app: {{ .Release.Name }}-flex-node
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-flex-node
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-flex-node
      annotations:
        # roll the DS when the config inputs change (can't include this same file -> would recurse)
        checksum/config: {{ printf "%s|%s|%s" $clusterCidr .Values.kubeProxy.apiServerHost .Release.Namespace | sha256sum }}
        {{- if .Values.debug }}
        # make `kubectl exec/logs/attach` (and k9s's shell) default to the debug toolbox, not kube-proxy
        kubectl.kubernetes.io/default-container: debug
        {{- end }}
    spec:
      serviceAccountName: {{ required "kubeProxy.serviceAccountName is required" .Values.kubeProxy.serviceAccountName }}
      hostNetwork: true
      # Pod-level (applies to the whole pod incl. kube-proxy): host PID + IPC namespaces so the debug
      # toolbox can see host processes and nsenter into other containers on the node.
      hostPID: true
      hostIPC: true
      priorityClassName: system-node-critical
      {{- with .Values.kubeProxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        # Every flex node carries the baked-in flexnode=true:NoSchedule taint (terraform cloud-init),
        # so tolerating it is intrinsic to landing on ANY flex node — hardcoded, not configurable.
        - { key: flexnode, operator: Exists, effect: NoSchedule }
        {{- with .Values.kubeProxy.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      initContainers:
        # Render kubeconfig.conf -> /etc/kube-proxy (shared emptyDir). Host precedence: the explicit
        # kubeProxy.apiServerHost value, else inferred from the SA token's aud claim. The token is
        # base64url JWT: take the payload segment, url->std base64 (tr) + pad, decode, and grep the
        # https://...azmk8s.io audience (skips the OIDC issuer and the double-quoted junk aud entry).
        - name: render-kubeconfig
          image: "{{ .Values.kubeProxy.initImage }}"
          env:
            - name: OVERRIDE_HOST
              value: {{ .Values.kubeProxy.apiServerHost | quote }}
          command:
            - sh
            - -c
            - |
              set -e
              host="$OVERRIDE_HOST"
              if [ -z "$host" ]; then
                p=$(cut -d. -f2 < /var/run/secrets/kubernetes.io/serviceaccount/token | tr '_-' '/+')
                case $((${#p} % 4)) in 2) p="$p==";; 3) p="$p=";; esac
                host=$(printf '%s' "$p" | base64 -d 2>/dev/null | grep -o 'https://[a-zA-Z0-9.-]*\.azmk8s\.io' | head -1 | sed 's#https://##')
              fi
              [ -n "$host" ] || { echo "could not determine apiServerHost: no aud match and no kubeProxy.apiServerHost override"; exit 1; }
              echo "kube-proxy apiserver host: $host"
              sed "s#__APISERVER_HOST__#${host}#g" /config/kubeconfig.conf.tpl > /etc/kube-proxy/kubeconfig.conf
              cp /config/config.conf /etc/kube-proxy/config.conf
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            - { name: kube-proxy-conf, mountPath: /etc/kube-proxy }
      containers:
        {{- if .Values.debug }}
        # Debug toolbox sidecar (top-level `debug: true`), on the flex node's hostNetwork/hostPID.
        # PID1 = `noded` (cnuss/dev, resolves cnuss/dev#7): self-provisions short-lived SSH CA trust
        # into the node's /etc/ssh (the RW hostPath below), then on `kubectl attach`/k9s `a` drops you
        # onto ubuntu@node over the shared host netns. `s`/exec still lands in this toolbox (nsenter,
        # tcpdump, ...). Baked NODED_PROVISION=1 + NODED_KEEPALIVE=1: if creds/node aren't ready it
        # holds the container Running (attachable, logs the reason) instead of crash-looping.
        # imagePullPolicy Always so :latest is refreshed on every (re)start.
        # Requires the host's /etc/ssh bound into kube1 — cloud-init appends `Bind=/etc/ssh` to afn's
        # /etc/systemd/nspawn/kube1.nspawn AFTER `aks-flex-node start` (afn clobbers a pre-start write)
        # + restarts the machine. Without that bind the hostPath below is kube1's own /etc/ssh -> FailedMount.
        - name: debug
          image: cnuss/dev:latest
          imagePullPolicy: Always
          command: ["noded"]
          stdin: true
          tty: true
          # Intentionally maxed-out for on-node debugging (debug: true only): full privileges, all
          # caps, run as root, seccomp unconfined, writable rootfs.
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
            readOnlyRootFilesystem: false
            capabilities:
              add: ["ALL"]
            seccompProfile:
              type: Unconfined
          # The node's /etc/ssh (RW) — via the cloud-init nspawn bind this is the EC2 host's dir, so
          # noded drops its TrustedUserCAKeys into the host's sshd_config.d/.
          volumeMounts:
            - { name: node-etc-ssh, mountPath: /etc/ssh }
        {{- end }}
        - name: kube-proxy
          image: "{{ .Values.kubeProxy.image }}"
          command:
            - /usr/local/bin/kube-proxy
            - --config=/etc/kube-proxy/config.conf
            - --hostname-override=$(NODE_NAME)
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - { name: kube-proxy-conf, mountPath: /etc/kube-proxy, readOnly: true }
            - { name: xtables-lock, mountPath: /run/xtables.lock }
            - { name: lib-modules, mountPath: /lib/modules, readOnly: true }
          resources:
            {{- toYaml .Values.kubeProxy.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-kube-proxy
        - name: kube-proxy-conf
          emptyDir: {}
        - name: xtables-lock
          hostPath:
            path: /run/xtables.lock
            type: FileOrCreate
        - name: lib-modules
          hostPath:
            path: /lib/modules
        {{- if .Values.debug }}
        # The node's /etc/ssh, RW, for noded's self-provisioned CA trust. Reaches the EC2 host only
        # because cloud-init binds host /etc/ssh into kube1 (nspawn Bind); type Directory guards it.
        - name: node-etc-ssh
          hostPath:
            path: /etc/ssh
            type: Directory
        {{- end }}
---
# NVIDIA GPU device plugin (YP6M-3096) — a SEPARATE DaemonSet (not a sidecar on the flex-node pod
# above): it must carry gpu.nodeSelector + runtimeClassName, neither of which can apply to the
# all-flex-nodes kube-proxy pod. No enable flag: the nodeSelector (p6m.dev/node-type=gpu-shared,
# auto-applied by cloud-init to GPU-family flex nodes) means this schedules ZERO pods until a GPU
# flex node exists, and starts one automatically when it does. Advertises nvidia.com/gpu against the
# host driver + `nvidia` containerd runtime cloud-init provisions. hostNetwork: reaches the kubelet
# over the device-plugins socket, so it skips the CNI chain (dodges the istio-cni window). Retire
# once the gpu-operator's own plugin can run on the node.
{{- if .Values.gpu.runtimeClass.create }}
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  # Cluster-scoped, chart-owned. Its `handler` points at the containerd `nvidia` runtime cloud-init
  # registers in kube1; the object NAME is separate (nvidia-flex) so it doesn't clash with the
  # cluster's existing `nvidia` RuntimeClass. Toggle gpu.runtimeClass.create=false to skip creating it.
  name: {{ .Values.gpu.runtimeClass.name }}
handler: {{ .Values.gpu.runtimeClass.handler }}
---
{{- end }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-nvidia-device-plugin
  namespace: kube-system
  labels:
    app: {{ .Release.Name }}-nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-nvidia-device-plugin
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-nvidia-device-plugin
    spec:
      # No pod networking needed (kubelet unix socket only); hostNetwork keeps it off the CNI chain.
      hostNetwork: true
      priorityClassName: system-node-critical
      runtimeClassName: {{ .Values.gpu.runtimeClass.name }}
      {{- with .Values.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        # Every flex node carries the baked-in flexnode=true:NoSchedule taint (terraform cloud-init),
        # so tolerating it is intrinsic to landing on ANY flex node — hardcoded, not configurable.
        - { key: flexnode, operator: Exists, effect: NoSchedule }
        {{- with .Values.gpu.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: nvidia-device-plugin
          image: {{ .Values.gpu.image | quote }}
          # The nvidia runtime (runtimeClassName above) injects the driver libs + GPU into this pod
          # so it can enumerate GPUs via NVML.
          env:
            - { name: NVIDIA_VISIBLE_DEVICES, value: "all" }
            - { name: NVIDIA_DRIVER_CAPABILITIES, value: "all" }
            - { name: FAIL_ON_INIT_ERROR, value: "true" }
          securityContext:
            privileged: true
          volumeMounts:
            - { name: device-plugin, mountPath: /var/lib/kubelet/device-plugins }
          resources:
            {{- toYaml .Values.gpu.resources | nindent 12 }}
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
