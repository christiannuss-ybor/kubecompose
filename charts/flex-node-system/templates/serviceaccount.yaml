# Dedicated SA for the system-node pod (CoreDNS always; FRR when enabled). It reuses the built-in
# system:coredns ClusterRole for CoreDNS's DNS perms (endpoints/services/pods/namespaces +
# endpointslices list/watch) — no new DNS role, and the managed `coredns` SA is left untouched. When
# the FRR relay is enabled it ALSO gets a tiny role to let discover-podcidr read this node's
# NodeNetworkConfig (its pod /24); with the relay off that role/binding is not created.
#
# The kube-proxy DaemonSet does NOT use this SA — it reuses the cilium SA (see values), so no SA
# or binding is created for it here.
{{- $frr := include "flex-node-system.frrEnabled" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
  namespace: kube-system
  labels:
    app: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-coredns
  labels:
    app: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:coredns
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: kube-system
{{- if $frr }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-nnc
  labels:
    app: {{ .Release.Name }}
rules:
  # FRR's discover-podcidr GETs this node's own NodeNetworkConfig for its overlay /24.
  - apiGroups: ["acn.azure.com"]
    resources: ["nodenetworkconfigs"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-nnc
  labels:
    app: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-nnc
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: kube-system
{{- end }}
