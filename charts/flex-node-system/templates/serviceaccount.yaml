# Dedicated SA for the system-node pod (FRR + CoreDNS). It reuses the built-in system:coredns
# ClusterRole for CoreDNS's DNS perms (endpoints/services/pods/namespaces + endpointslices
# list/watch) — no new DNS role, and the managed `coredns` SA is left untouched — plus a tiny role
# for FRR's discover-podcidr to read this node's NodeNetworkConfig (its pod /24).
#
# The kube-proxy DaemonSet does NOT use this SA — it reuses the cilium SA (see values), so no SA
# or binding is created for it here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-coredns
  labels:
    app: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:coredns
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-nnc
  labels:
    app: {{ .Release.Name }}
rules:
  # FRR's discover-podcidr GETs this node's own NodeNetworkConfig for its overlay /24.
  - apiGroups: ["acn.azure.com"]
    resources: ["nodenetworkconfigs"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-nnc
  labels:
    app: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-nnc
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
