# CoreDNS ClusterIP — the flex nodes' --cluster-dns. Selects the system pod; since it's hostNetwork
# the endpoints are the system node IP(s), so flex nodes reach CoreDNS over the node-to-node VPN.
# The VIP is system.coredns.clusterIP, or (empty) derived from kube-dns +"0" — see the helper.
{{- $dnsClusterIP := include "flex-node-system.dnsClusterIP" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dns
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    k8s-app: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: {{ required "flex CoreDNS VIP unresolved: set system.coredns.clusterIP, or install/upgrade against a live cluster with a kube-dns Service (offline `helm template`/`--dry-run` can't look it up)" $dnsClusterIP | quote }}
  selector:
    app: {{ .Release.Name }}
  ports:
    - { name: dns, port: 53, targetPort: 53, protocol: UDP }
    - { name: dns-tcp, port: 53, targetPort: 53, protocol: TCP }
{{- if (include "flex-node-system.frrEnabled" .) }}
---
# Headless Service over the FRR relay's :179 — no VIP; resolves to the relay node IP(s) (hostNetwork
# endpoints) for observability / peer inspection. Not on the datapath. Only when the relay is enabled.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-bgp
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: {{ .Release.Name }}
  ports:
    - { name: bgp, port: 179, targetPort: 179, protocol: TCP }
{{- end }}
