# The system-node pod: CoreDNS (always) + the FRR relay (when asn/routeServer set) + the Headscale
# control server (when system.headscale.enabled) — sidecars in ONE hostNetwork pod, DaemonSet-pinned
# to the AKS system VMSS pool. CoreDNS serves cluster DNS bound to the node IP, so
# flex nodes reach it over the node-to-node VPN. When the FRR fiddle bits are set (asn +
# routeServer.addresses), FRR also advertises this node's own pod /24 to the Azure Route Server
# (keeps istiod, a pod IP, reachable from flex nodes); with them empty (the default — on-prem /
# ExpressRoute clusters have no Route Server) the pod is CoreDNS-only. One CoreDNS per system node.
#
# Init (on the cached frr image, so a restart never pulls a throwaway tool image):
#   discover-podcidr  (FRR only) reads this node's /24 from its NodeNetworkConfig via the apiserver
#                     (busybox wget + the SA token, verified against the cluster CA); retries until ready.
#   prepare-config    renders /etc/coredns/Corefile (always); when FRR is on, /etc/frr/frr.conf with
#                     sed (node IP + the discovered /24) plus the FRR daemon list; when Headscale is
#                     on, /etc/headscale/config.yaml (node IP sed'd into server_url + listen addrs).
#
# SINGLE-INSTANCE CAVEAT (Headscale): this is a DaemonSet, so the sidecar runs on EVERY system node,
# and its sqlite DB lives in a per-node hostPath — >1 system node = N independent headscale servers.
# Coherent only on ONE system node (the case on the playground). Revisit if the system pool scales.
{{- $frr := include "flex-node-system.frrEnabled" . }}
{{- $hs := .Values.system.headscale.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  # Default updateStrategy (RollingUpdate, maxUnavailable 1). Note these pods are hostNetwork
  # (bind :179/:53), so a replacement can't surge alongside the old one — updates are one-at-a-time.
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/system-configmap.yaml") . | sha256sum }}
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      serviceAccountName: {{ .Release.Name }}
      # Pin to the system VMSS node: schedule only where karpenter.sh/nodepool is ABSENT — present
      # on every Karpenter node, absent on the system VMSS pool AND on flex nodes (flex nodes are
      # then excluded by their untolerated flexnode taint). Hardcoded for now; make it a value later.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.sh/nodepool
                    operator: DoesNotExist
      {{- with .Values.system.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if $frr }}
        # discover this node's OWN pod /24 -> /work/podcidr, from its Azure NodeNetworkConfig
        # (status.networkContainers[0].primaryIP). Read straight from the apiserver with the frr
        # image's busybox wget + the SA token; busybox wget takes no --ca flag, so append the
        # cluster CA to the trust bundle (ephemeral, this container) for a verified TLS call.
        - name: discover-podcidr
          image: "{{ .Values.system.frr.image }}"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - sh
            - -c
            - |
              SA=/var/run/secrets/kubernetes.io/serviceaccount
              cat "$SA/ca.crt" >> /etc/ssl/certs/ca-certificates.crt
              cidr=$(wget -qO- --header="Authorization: Bearer $(cat "$SA/token")" \
                "https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}/apis/acn.azure.com/v1alpha/namespaces/kube-system/nodenetworkconfigs/${NODE_NAME}" \
                2>/dev/null | grep -o '"primaryIP": *"[^"]*"' | head -1 | sed 's/.*: *"//; s/"//')
              [ -n "$cidr" ] || { echo "no NNC primaryIP for $NODE_NAME yet (apiserver unreachable or NNC not ready); exiting to retry"; exit 1; }
              printf '%s' "$cidr" > /work/podcidr
              echo "discovered pod CIDR $cidr"
          volumeMounts:
            - { name: work, mountPath: /work }
        {{- end }}
        # render the Corefile (always); when FRR is on, also render frr.conf + the daemon list.
        # sed (no gomplate): __ROUTER_ID__/__HOST_IP__ = the node IP (downward API), __POD_CIDR__ =
        # the discovered /24. `|` is the sed delimiter (CIDRs have '/').
        - name: prepare-config
          image: "{{ .Values.system.frr.image }}"
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          command:
            - sh
            - -c
            - |
              {{- if $frr }}
              cp /config/daemons /etc/frr/daemons
              sed -e "s|__ROUTER_ID__|${HOST_IP}|g" \
                  -e "s|__POD_CIDR__|$(cat /work/podcidr)|g" \
                  /config/speaker.conf.tpl > /etc/frr/frr.conf
              {{- end }}
              sed -e "s|__HOST_IP__|${HOST_IP}|g" \
                  /config/Corefile.tpl > /etc/coredns/Corefile
              {{- if $hs }}
              sed -e "s|__HOST_IP__|${HOST_IP}|g" \
                  /config/headscale.yaml.tpl > /etc/headscale/config.yaml
              {{- end }}
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            {{- if $frr }}
            - { name: etc-frr, mountPath: /etc/frr }
            {{- end }}
            - { name: coredns-conf, mountPath: /etc/coredns }
            {{- if $hs }}
            - { name: headscale-conf, mountPath: /etc/headscale }
            {{- end }}
            {{- if $frr }}
            - { name: work, mountPath: /work }
            {{- end }}
      containers:
        {{- if $frr }}
        - name: frr
          image: "{{ .Values.system.frr.image }}"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW", "NET_BIND_SERVICE", "SYS_ADMIN"]
          command: ["sh", "-c", "exec /usr/lib/frr/docker-start"]
          volumeMounts:
            - { name: etc-frr, mountPath: /etc/frr }
          resources:
            {{- toYaml .Values.system.frr.resources | nindent 12 }}
        {{- end }}
        - name: coredns
          image: "{{ .Values.system.coredns.image }}"
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - { containerPort: 53, name: dns, protocol: UDP }
            - { containerPort: 53, name: dns-tcp, protocol: TCP }
            - { containerPort: 9153, name: metrics, protocol: TCP }
            - { containerPort: 8080, name: health, protocol: TCP }
            - { containerPort: 8181, name: ready, protocol: TCP }
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /ready, port: 8181 }
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add: ["NET_BIND_SERVICE"]
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.system.coredns.resources | nindent 12 }}
          volumeMounts:
            - { name: coredns-conf, mountPath: /etc/coredns, readOnly: true }
        {{- if $hs }}
        # Headscale control server (YP6M-3040). hostNetwork (the pod already is) => binds the node IP,
        # so flex nodes reach it over the VPN. Port 8085, NOT 8080 (CoreDNS health owns :8080 here).
        # No k8s API access; readOnlyRootFilesystem + writable mounts mirror the guide's `--read-only`.
        - name: headscale
          image: "{{ .Values.system.headscale.image }}"
          args: ["serve"]
          ports:
            - { containerPort: {{ .Values.system.headscale.httpPort }}, name: hs-http, protocol: TCP }
            - { containerPort: {{ .Values.system.headscale.metricsPort }}, name: hs-metrics, protocol: TCP }
            - { containerPort: {{ .Values.system.headscale.grpcPort }}, name: hs-grpc, protocol: TCP }
            - { containerPort: 3478, name: hs-stun, protocol: UDP }   # embedded DERP STUN
          livenessProbe:
            httpGet: { path: /health, port: {{ .Values.system.headscale.httpPort }} }
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /health, port: {{ .Values.system.headscale.httpPort }} }
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: headscale-conf, mountPath: /etc/headscale, readOnly: true }
            - { name: headscale-data, mountPath: /var/lib/headscale }
            - { name: headscale-run, mountPath: /var/run/headscale }   # unix socket (guide's tmpfs)
          resources:
            {{- toYaml .Values.system.headscale.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}
        - name: coredns-conf
          emptyDir: {}
        {{- if $frr }}
        - name: etc-frr
          emptyDir: {}
        - name: work
          emptyDir: {}
        {{- end }}
        {{- if $hs }}
        - name: headscale-conf
          emptyDir: {}
        - name: headscale-run
          emptyDir: {}
        # sqlite DB + noise key persist here, per node. DirectoryOrCreate so the node makes it on
        # first schedule. (Per-node — see the single-instance caveat in the header.)
        - name: headscale-data
          hostPath:
            path: {{ .Values.system.headscale.dataHostPath }}
            type: DirectoryOrCreate
        {{- end }}
