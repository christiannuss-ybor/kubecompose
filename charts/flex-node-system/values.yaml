# flex-node-system — everything the AKS Flex (cross-cloud) nodes depend on, in one chart:
#   (1) `system.*` — a combined system-node pod (FRR relay + CoreDNS) that runs ON the system pool.
#   (2) `kubeProxy.*` — a kube-proxy DaemonSet that runs ON the flex nodes.
# Merges the former charts/bgp (FRR relay) and charts/flex-kube-proxy (kube-proxy + CoreDNS).

# Debug: when true, adds a cnuss/dev toolbox sidecar (containers[0], sleep infinity) to the flex-node
# DaemonSet for on-node debugging. Off by default.
debug: false

# --- FRR relay fiddle bits (EMPTY = relay OFF) ---
# The FRR relay only applies when this cluster has an Azure Route Server to eBGP-peer. Most targets
# (on-prem / ExpressRoute) have NO Route Server and route natively, so these are empty by default
# and the system-node pod runs CoreDNS ONLY. Set asn + at least one routeServer.addresses[] to turn
# the relay on (see values-ybor-playground.yaml); that gates the FRR container, its pod-CIDR
# discovery, the :179 Service, and the NodeNetworkConfig RBAC in as a unit.
asn: ""                          # the relay's ASN (eBGP to the Route Server); empty => relay off
routeServer:
  asn: ""                        # Azure Route Server ASN (65515 is Azure's default) when present
  addresses: []                  # the RS's virtualRouterIps (per-cluster); empty => relay off

# (1) The system-node pod: a hostNetwork DaemonSet pinned to the AKS system VMSS pool, running the
# FRR relay + CoreDNS in ONE pod (two containers). hostNetwork is required by FRR (it peers the
# Route Server from the node IP and advertises next-hop=node IP); CoreDNS therefore also runs
# hostNetwork and binds the node IP (Corefile `bind`), so flex nodes reach it over the plain
# node-to-node VPN (the 10.224.0.0/12 route) instead of the RS-injected pod /24 — DNS is decoupled
# from the relay. One CoreDNS per system node (scale the system pool to scale DNS).
system:
  # Node placement (nodeAffinity on karpenter.sh/nodepool DoesNotExist + this toleration) is
  # hardcoded in templates/system-daemonset.yaml for now — turn the label into a value later.
  tolerations:
    - key: CriticalAddonsOnly    # system VMSS node taint
      operator: Exists

  # FRR relay: eBGP-peers the Azure Route Server and advertises THIS node's own /24 (next-hop=self)
  # so istiod (a pod IP) stays reachable from flex nodes. Only an AKS pod /24 leaves toward the RS.
  frr:
    image: quay.io/frrouting/frr:10.2.1   # the ONLY image the system pod uses (init runs on it too)
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits: { memory: 128Mi }

  # CoreDNS: mirrors managed AKS CoreDNS, bound to the node IP (see Corefile `bind`). Fronted by a
  # pinned ClusterIP the flex nodes use as --cluster-dns.
  coredns:
    image: mcr.microsoft.com/oss/v2/kubernetes/coredns:v1.12.1-19   # matches managed AKS CoreDNS
    # The flex CoreDNS Service VIP (the flex nodes' --cluster-dns). EMPTY STRING => derived at
    # install/upgrade from the cluster's kube-dns Service ClusterIP by appending "0" (10.0.0.10 ->
    # 10.0.0.100) — a stable free IP in the service CIDR. Set a value to override (or when rendering
    # offline: `helm template`/`--dry-run` can't look up kube-dns). NOTE: the flex node's kubelet
    # --cluster-dns (terraform dns_service_ip) must equal whatever this resolves to.
    clusterIP: ""
    resources:
      requests: { cpu: 100m, memory: 70Mi }
      limits: { memory: 170Mi }

  # Headscale — the self-hosted Tailscale control server for the cross-cloud WireGuard overlay
  # (YP6M-3040). ITERATION 1: run the server as a SIDECAR in the system-node pod (alongside
  # CoreDNS/FRR). The pod is already hostNetwork, so headscale binds the node IP and rides the
  # node-to-node VPN — flex nodes can register in a later iteration. Its config is rendered by the
  # pod's existing prepare-config init (node IP sed'd in). No Service / TLS / pre-auth keys / agents
  # yet. OFF by default (opt-in per cluster; enabled in values-ybor-playground.yaml). No k8s API
  # access => default ServiceAccount. SINGLE-INSTANCE: sqlite lives in a per-node hostPath, so >1
  # system node = N independent servers — coherent only on ONE system node. Fine for the spike.
  headscale:
    enabled: false
    image: ghcr.io/juanfont/headscale:v0.29.2   # ghcr (not Docker Hub) to dodge pull rate limits
    # HTTP API / registration port. NOT 8080 — CoreDNS's health endpoint already binds :8080 on the
    # hostNetwork system node, so headscale takes a free node port.
    httpPort: 8085
    metricsPort: 9090     # CoreDNS metrics is :9153, so :9090 is free on the node
    grpcPort: 50443       # remote `headscale` CLI (unused in iteration 1)
    dataHostPath: /var/lib/headscale   # sqlite DB + noise key persist here, per node
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { memory: 256Mi }
    # ITERATION 2 (YP6M-3040): a bootstrap sidecar that mints a REUSABLE pre-auth key and stores it in
    # a Secret for the tailscale agents (iteration 3) to consume — so no manual key/secret handling.
    # It's a NATIVE SIDECAR init container (restartPolicy: Always): the headscale CLI needs the server
    # up and talks over the shared unix socket, so the bootstrapper must be co-located and start after
    # headscale. Idempotent: ensure the user, mint a key ONLY if the Secret is absent, then idle. The
    # server image is distroless (no shell/kubectl), so this uses a tools image + fetches the headscale
    # binary. OFF by default; on in values-ybor-playground.yaml.
    bootstrap:
      enabled: false
      # shell + kubectl + curl + jq. Docker Hub (rate-limit risk) but swappable and it's one pull on
      # the single system node; the distroless server image can't be reused here.
      image: alpine/k8s:1.33.7
      headscaleVersion: "0.29.2"       # release binary to fetch — keep aligned with the image tag above
      user: flex                       # headscale user the flex/AKS nodes register under
      secretName: headscale-authkey    # Secret (release namespace) that receives authkey/loginServer/user
      keyExpiration: "8760h"           # reusable key lifetime (~1y) — spike-length
      resources:
        requests: { cpu: 10m, memory: 32Mi }
        limits: { memory: 128Mi }

# (2) kube-proxy on the flex nodes ONLY (nodeSelector managed=false): programs the service DNAT
# locally so in-cluster pods on a flex node can reach ClusterIP services. Reuses the cilium
# ServiceAccount (already has services/endpoints/endpointslices/nodes read) — no new SA/RBAC; it
# lacks events + servicecidrs perms, which is non-fatal (kube-proxy skips event recording and, on a
# single static service CIDR, needs no servicecidr discovery).
kubeProxy:
  image: registry.k8s.io/kube-proxy:v1.33.8
  # Tiny busybox for the init that renders kube-proxy's kubeconfig (derives the apiserver host from
  # the SA token's aud when apiServerHost is empty). The kube-proxy image itself is too minimal
  # (no base64/sed/cut/tr). gcr.io => public, no auth, no Docker Hub rate limit; ~694 KB. Pinned.
  initImage: gcr.io/google-containers/busybox:1.27.2
  # The apiserver FQDN the flex nodes dial (kube-proxy can't use the 10.0.0.1 ClusterIP it programs).
  # EMPTY STRING => infer it from the SA token's `aud` claim at pod start (on AKS the projected token
  # audience carries the apiserver FQDN). Set a value only to override (non-AKS, or a custom
  # --api-audiences that omits the FQDN).
  apiServerHost: ""
  # AKS pod-CIDR aggregate. kube-proxy masquerades Service traffic whose source is OUTSIDE this, so
  # flex pods (172.20.x) get SNAT'd to the node IP (their replies must return over the node CIDR).
  # EMPTY STRING => derived at install/upgrade from a node's NodeNetworkConfig
  # (status.networkContainers[].subnetAddressSpace, e.g. 192.168.0.0/16); if neither this override
  # nor the lookup yields a value (e.g. offline render), falls back to 192.168.0.0/16 (the AKS default).
  clusterCidr: ""
  serviceAccountName: cilium
  nodeSelector:
    kubernetes.azure.com/managed: "false"
  # EXTRA tolerations, appended to the flexnode=true:NoSchedule toleration the flex-node DaemonSet
  # hardcodes (that taint is on every flex node). kube-proxy must run on EVERY flex node, so this
  # ALSO tolerates the GPU node's nvidia.com/gpu:NoSchedule taint (terraform flex_nodes[*].taints) —
  # add any other per-node taints you set in flex_nodes[*].taints here, or kube-proxy won't land there.
  tolerations:
    - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits: { memory: 128Mi }

# (3) NVIDIA GPU device plugin (YP6M-3096). Always rendered, but SELF-GATING — no enable flag:
# nodeSelector is p6m.dev/node-type=gpu-shared (auto-applied by cloud-init to GPU-family flex nodes),
# so the DaemonSet schedules ZERO pods on clusters/nodes without a GPU flex node and starts one
# automatically when a GPU node appears. Advertises nvidia.com/gpu against the HOST-installed driver
# + the `nvidia` containerd runtime that terraform/ec2/cloud-init.sh.tftpl sets up. hostNetwork => it
# reaches the kubelet over the device-plugins socket and skips the CNI chain (dodging the istio-cni
# window). Standalone rather than the gpu-operator's plugin because the operator's operands can't run
# on the flex node while ztunnel/ambient is unhealthy; retire this once they can.
gpu:
  image: nvcr.io/nvidia/k8s-device-plugin:v0.17.1
  # A RuntimeClass maps a pod's runtimeClassName to a containerd runtime "handler". We create our OWN
  # flex-scoped RuntimeClass OBJECT (`name`) rather than reuse the cluster's existing `nvidia` one, so
  # we don't collide with its ownership (gpu-operator) OR inherit any scheduling constraints it carries
  # that could keep flex pods off the flex node. The object name and the handler name are independent:
  # `handler` still points at the `nvidia` containerd runtime that cloud-init's `nvidia-ctk runtime
  # configure` registers inside kube1, so no cloud-init change is needed.
  runtimeClass:
    create: true
    name: nvidia-flex   # the RuntimeClass OBJECT pods reference (chart-owned; avoids the cluster's `nvidia`)
    handler: nvidia     # the containerd runtime handler registered in kube1 (nvidia-ctk default name)
  # GPU flex nodes only (label auto-applied by cloud-init to GPU-family instance types).
  nodeSelector:
    p6m.dev/node-type: gpu-shared
  # EXTRA tolerations, appended to the flexnode=true:NoSchedule toleration the DaemonSet hardcodes
  # (that taint is on every flex node). The GPU node ALSO self-taints nvidia.com/gpu:NoSchedule
  # (terraform flex_nodes[*].taints), so tolerate it here; adjust if that taint ever changes.
  tolerations:
    - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits: { memory: 128Mi }
