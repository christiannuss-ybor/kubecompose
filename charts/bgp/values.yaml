# Per-node FRR BGP speaker (DaemonSet) for Kubernetes — advertises each node's pod CIDR
# to an external route server (e.g. Azure Route Server), so the pod network becomes
# routable off-cluster. Pod CIDR is discovered from Azure's NodeNetworkConfig.
#
# (An earlier version also shipped an in-cluster "built-in" route server for the docker
# lab; that's been removed pending a rethink — this chart is currently AKS-shaped.)

asn: 65001                       # ASN shared by the node speakers

# The speaker runs as a DaemonSet on every node. No affinity, and a blanket `operator: Exists`
# toleration so it tolerates ALL taints — the AKS system node (CriticalAddonsOnly) and the flex
# EC2 nodes (flexnode=true:NoSchedule) included.
speaker:
  # rollout speed: how many pods update at once (k8s DaemonSet default is 1). "100%" = all at
  # once (brief full restart, fine for these non-critical speakers); dial down (e.g. "25%")
  # for a gentler roll.
  maxUnavailable: "100%"
  tolerations:
    - operator: Exists

# Relay: designate ONE node (by IP) whose speaker ALSO peers the Azure Route Server and
# re-advertises the mesh-learned per-node pod /24s with next-hops preserved (attribute-unchanged),
# so the RS injects them into the VNet + advertises to AWS. Hardcoded IP — each speaker pod
# self-identifies by matching its own HOST_IP (downward API) against relay.nodeIP; only the match
# gets the RS config, so the RS sees 1 peer, not 20. Empty nodeIP disables the relay role.
# Only AKS pod /24s (192.168.0.0/16 le 24) are advertised to the RS — flex /25s are filtered out
# (their next-hop is an AWS IP, not routable in the VNet). Keep in sync with terraform relay_peer_ip.
relay:
  nodeIP: "10.224.0.108"           # stable system-node IP (aks-systemd4psv6-...-vmss000049)
  routeServerAsn: 65515
  routeServerAddresses:
    - 10.225.255.36
    - 10.225.255.37

# debug: true adds a gcr.io/cnuss/dev sidecar (sleep infinity) to each speaker pod, sharing the
# pod netns + the config/etc-frr/work volumes and the frr caps — exec in to poke at BGP,
# the rendered frr.conf, and the discovered pod CIDR. Hardcoded on for now (bring-up debugging).
debug: true

# Single-purpose tool images. Repositories are hardcoded in the templates
# (quay.io/frrouting/frr, gcr.io/gomplate/gomplate, and gcr.io/bitnami/kubectl:latest for the NNC
# lookup — Bitnami moved version tags behind Bitnami Secure Images, so kubectl has no
# knob). Bump the versions here.
tooling:
  frr:
    version: "10.2.1"
  gomplate:
    version: "stable"

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi
