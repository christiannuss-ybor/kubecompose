# FRR BGP relay speaker (DaemonSet, pinned to the AKS SYSTEM node only) for AKS — advertises that
# node's own pod /24 to an external route server (the Azure Route Server) so CoreDNS + istiod
# become reachable off-cluster (the flex nodes, over the VPN). Pod CIDR is discovered from Azure's
# NodeNetworkConfig. No iBGP mesh: full pod-to-pod was abandoned, so the speaker peers only the RS.
#
# (An earlier version ran on every node and peered a full iBGP mesh, re-advertising all per-node
# /24s; that scaffolding was pruned once flex-node DNS + mesh worked off the single system /24.)

asn: 65001                       # the relay speaker's ASN (eBGP to the Route Server)

speaker:
  # rollout speed: how many pods update at once. With the system-node pin this is a single pod
  # anyway, so "100%" is a brief single restart (fine for this non-critical speaker).
  maxUnavailable: "100%"
  # Pin to the system VMSS node: nodeAffinity requires this label be ABSENT — it's present on every
  # Karpenter node, absent on the system VMSS pool AND on flex nodes. Flex nodes are then excluded
  # by their untolerated flexnode taint (we tolerate only CriticalAddonsOnly). Mirrors the
  # flex-kube-proxy CoreDNS placement so the relay lands on the same node as the pods it advertises.
  excludeKarpenterLabelKey: karpenter.sh/nodepool
  tolerations:
    - key: CriticalAddonsOnly    # system VMSS node taint
      operator: Exists

# Route Server peering: the relay eBGP-peers the Azure Route Server and advertises the system
# node's own /24 (next-hop preserved = this node), so the RS injects it into the VNet + advertises
# to AWS. Only an AKS pod /24 (192.168.0.0/16 le 24) can leave toward the RS (the RS-OUT filter).
# The RS BGP connection peers this node BY IP on the terraform side, so keep terraform's
# relay_peer_ip pointed at the system node's IP — the chart itself no longer needs that IP (it
# lands on the node via the affinity above, not by matching HOST_IP).
relay:
  routeServerAsn: 65515
  routeServerAddresses:
    - 10.225.255.36
    - 10.225.255.37

# debug: true adds a gcr.io/cnuss/dev sidecar (sleep infinity) to the speaker pod, sharing the
# pod netns + the config/etc-frr/work volumes and the frr caps — exec in to poke at BGP, the
# rendered frr.conf, and the discovered pod CIDR. Off by default: it's a moving :latest tag
# (imagePullPolicy Always), so leaving it on makes every relay restart depend on a re-pull through
# the node's registry mirror. Flip on only for hands-on bring-up debugging.
debug: false

# The frr image is the ONLY image the relay uses — the init containers run on it too (busybox
# wget reads NodeNetworkConfig, sed renders frr.conf), so a restart never pulls a throwaway tool
# image (no more gcr.io/bitnami/kubectl or gomplate). Keeping the pull surface to this one image
# means a relay restart only depends on the image the frr container needs anyway. Bump here.
tooling:
  frr:
    version: "10.2.1"

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi
