# BGP relay speaker (FRR). Runs on the AKS SYSTEM node ONLY (nodeAffinity below) and does exactly
# one job: advertise that node's own pod /24 (192.168.6.0/24 — CoreDNS + istiod) to the Azure
# Route Server over eBGP, so the RS injects it into the VNet and the VPN gateway advertises it to
# AWS. That single /24 is all the flex nodes need for DNS + the service mesh; the old per-node iBGP
# mesh (every node peering every other + re-advertising all /24s) served full pod-to-pod, which is
# abandoned, so it's gone. hostNetwork means no CNI dependency and the advertised next-hop is the
# node's own underlay IP (what the RS must inject).
#
# Startup is two init containers sharing /etc/frr + /work (emptyDir), BOTH on the (cached) frr
# image so a restart never has to pull a throwaway tool image through the node's registry mirror:
#   discover-podcidr (frr) this node's pod /24 -> /work/podcidr, read from its NodeNetworkConfig
#                          via the apiserver (busybox wget + the SA token, verified against the
#                          cluster CA); exits non-zero until it resolves so the kubelet retries.
#   prepare-config   (frr) renders /etc/frr/frr.conf from /config/speaker.conf.tpl with sed
#                          (HOST_IP as router-id + the discovered /24) and drops the daemon list.
# The frr container then runs (plus a debug sidecar when debug=true).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  # roll fast — these are non-critical bring-up speakers. maxUnavailable = how many pods update
  # at once (k8s default is 1 = one-by-one). maxSurge isn't usable: the pod is hostNetwork and
  # binds :179, so a replacement can't start alongside the old one.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.speaker.maxUnavailable | quote }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      serviceAccountName: {{ .Release.Name }}
      # Pin to the AKS system VMSS node — the only node that (a) originates the /24 we advertise and
      # (b) has a NIC with IP-forwarding on. karpenter.sh/nodepool is absent on the system VMSS pool
      # (and on flex nodes), present on every Karpenter node; the flex nodes are then excluded by
      # their untolerated flexnode taint (we tolerate only CriticalAddonsOnly). Same recipe as the
      # flex-kube-proxy CoreDNS placement, so the two land together.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ .Values.speaker.excludeKarpenterLabelKey }}
                    operator: DoesNotExist
      {{- with .Values.speaker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # discover this node's OWN pod /24 -> /work/podcidr, from its Azure NodeNetworkConfig
        # (status.networkContainers[0].primaryIP — the per-node overlay /24 we advertise
        # next-hop=self, NOT the /16 aggregate). Read straight from the apiserver with the frr
        # image's busybox wget + the pod's SA token, so no separate kubectl image is pulled. busybox
        # wget/ssl_client verify against the system CA bundle and take no --ca flag, so we append the
        # cluster CA to that bundle (ephemeral, this container) for a verified TLS call. Exits
        # non-zero until the /24 resolves; the kubelet restarts it until it does.
        - name: discover-podcidr
          image: "quay.io/frrouting/frr:{{ .Values.tooling.frr.version }}"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - sh
            - -c
            - |
              SA=/var/run/secrets/kubernetes.io/serviceaccount
              cat "$SA/ca.crt" >> /etc/ssl/certs/ca-certificates.crt
              cidr=$(wget -qO- --header="Authorization: Bearer $(cat "$SA/token")" \
                "https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}/apis/acn.azure.com/v1alpha/namespaces/kube-system/nodenetworkconfigs/${NODE_NAME}" \
                2>/dev/null | grep -o '"primaryIP": *"[^"]*"' | head -1 | sed 's/.*: *"//; s/"//')
              [ -n "$cidr" ] || { echo "no NNC primaryIP for $NODE_NAME yet (apiserver unreachable or NNC not ready); exiting to retry"; exit 1; }
              printf '%s' "$cidr" > /work/podcidr
              echo "discovered pod CIDR $cidr"
          volumeMounts:
            - { name: work, mountPath: /work }
        # render frr.conf with sed (no gomplate image): substitute HOST_IP (downward API) as the
        # router-id and the discovered /24 into the template, then drop the daemon list. Uses `|` as
        # the sed delimiter since the CIDR contains '/'. All in the frr image.
        - name: prepare-config
          image: "quay.io/frrouting/frr:{{ .Values.tooling.frr.version }}"
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          command:
            - sh
            - -c
            - |
              cp /config/daemons /etc/frr/daemons
              sed -e "s|__ROUTER_ID__|${HOST_IP}|g" \
                  -e "s|__POD_CIDR__|$(cat /work/podcidr)|g" \
                  /config/speaker.conf.tpl > /etc/frr/frr.conf
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            - { name: etc-frr, mountPath: /etc/frr }
            - { name: work, mountPath: /work }
      containers:
        - name: frr
          image: "quay.io/frrouting/frr:{{ .Values.tooling.frr.version }}"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW", "NET_BIND_SERVICE", "SYS_ADMIN"]
          command: ["sh", "-c", "exec /usr/lib/frr/docker-start"]
          volumeMounts:
            - { name: etc-frr, mountPath: /etc/frr }
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.debug }}
        # debug sidecar: shares the pod netns + volumes + caps. Exec in to inspect BGP,
        # the rendered /etc/frr/frr.conf, and /work/podcidr. imagePullPolicy Always since
        # gcr.io/cnuss/dev:latest is a moving tag.
        - name: debug
          image: "gcr.io/cnuss/dev:latest"
          imagePullPolicy: Always
          command: ["sleep", "infinity"]
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW", "NET_BIND_SERVICE", "SYS_ADMIN"]
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            - { name: etc-frr, mountPath: /etc/frr }
            - { name: work, mountPath: /work }
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}
        - name: etc-frr
          emptyDir: {}
        - name: work
          emptyDir: {}
