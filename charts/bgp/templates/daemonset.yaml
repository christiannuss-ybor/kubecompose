# Per-node BGP speaker (FRR). Advertises this node's own pod CIDR and peers the other nodes it
# discovers, so pod networks become routable across the fabric. hostNetwork means no CNI
# dependency: the pod lands and BGP converges even on a node whose pod network isn't up yet.
#
# Startup is a chain of single-purpose init containers sharing /etc/frr + /work (emptyDir):
#   prepare-daemons    (frr)      writes the daemon list
#   discover-podcidr   (kubectl)  this node's pod CIDR -> /work/podcidr (NNC primaryIP, else the
#                                 flex.azure.com/pod-* labels); exits non-zero until it resolves
#   discover-neighbors (kubectl)  other nodes' IPs -> /work/neighbors.json (from NodeNetworkConfig)
#   prepare-config     (gomplate) renders frr.conf from both; errors (and restarts) if podcidr missing
# The frr container then runs (plus a debug sidecar when debug=true).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  # roll fast — these are non-critical bring-up speakers. maxUnavailable = how many pods update
  # at once (k8s default is 1 = one-by-one). maxSurge isn't usable: the pod is hostNetwork and
  # binds :179, so a replacement can't start alongside the old one.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.speaker.maxUnavailable | quote }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      serviceAccountName: {{ .Release.Name }}
      {{- with .Values.speaker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: prepare-daemons
          image: "quay.io/frrouting/frr:{{ .Values.tooling.frr.version }}"
          command: ["sh", "-c", "cp /config/daemons /etc/frr/daemons"]
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            - { name: etc-frr, mountPath: /etc/frr }
        # discover this node's OWN pod CIDR -> /work/podcidr for gomplate. Prefer Azure
        # NodeNetworkConfig (managed AKS nodes): networkContainers[0].primaryIP is this node's
        # own overlay /24 (e.g. 192.168.3.0/24) — the per-node prefix we advertise with
        # next-hop=self, NOT the whole subnetAddressSpace /16 aggregate. Nodes with no NNC (the
        # flex EC2 nodes) fall back to the flex.azure.com/pod-{network,prefix} labels set at
        # registration. Exits non-zero until a CIDR resolves; the kubelet restarts it until it does.
        - name: discover-podcidr
          # bitnami/kubectl (Debian, has a shell). Pinned to :latest — Bitnami moved
          # version-tagged images behind Bitnami Secure Images; latest stays public.
          image: "bitnami/kubectl:latest"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - sh
            - -c
            - |
              cidr=$(kubectl -n kube-system get nodenetworkconfig "$NODE_NAME" \
                -o jsonpath='{.status.networkContainers[0].primaryIP}' 2>/dev/null || true)
              if [ -z "$cidr" ]; then
                net=$(kubectl get node "$NODE_NAME" -o jsonpath='{.metadata.labels.flex\.azure\.com/pod-network}' 2>/dev/null || true)
                pfx=$(kubectl get node "$NODE_NAME" -o jsonpath='{.metadata.labels.flex\.azure\.com/pod-prefix}' 2>/dev/null || true)
                [ -n "$net" ] && [ -n "$pfx" ] && cidr="$net/$pfx"
              fi
              [ -n "$cidr" ] || { echo "no pod CIDR for $NODE_NAME yet (NNC primaryIP + flex labels both empty); exiting to retry"; exit 1; }
              printf '%s' "$cidr" > /work/podcidr
              echo "discovered pod CIDR $cidr"
          volumeMounts:
            - { name: work, mountPath: /work }
        # discover BGP neighbors: every OTHER node's underlay IP, as a JSON array to
        # /work/neighbors.json for gomplate. Two sources merged: AKS nodes from their
        # NodeNetworkConfig (status.networkContainers[0].nodeIP), and flex nodes (which have no
        # NNC) by their InternalIP, selected via the flex.azure.com/pod-network label. Self is
        # dropped by node name. Best-effort: an empty list is valid (a router with no neighbors),
        # and the set is fixed at pod start (nodes added later need a pod restart to be picked up).
        - name: discover-neighbors
          image: "bitnami/kubectl:latest"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - sh
            - -c
            - |
              {
                kubectl -n kube-system get nodenetworkconfig \
                  -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.status.networkContainers[0].nodeIP}{"\n"}{end}' 2>/dev/null
                kubectl get nodes -l flex.azure.com/pod-network \
                  -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.status.addresses[?(@.type=="InternalIP")].address}{"\n"}{end}' 2>/dev/null
              } \
                | awk -v self="$NODE_NAME" '$1 != self && $2 != "" { print $2 }' \
                | sort -u \
                | awk 'BEGIN{sep="";printf "["} {printf "%s\"%s\"",sep,$0;sep=","} END{print "]"}' \
                > /work/neighbors.json
              echo "discovered neighbors: $(cat /work/neighbors.json)"
          volumeMounts:
            - { name: work, mountPath: /work }
        # render frr.conf. gomplate runs as its own entrypoint (the image has no shell): HOST_IP
        # from env, pod CIDR from /work/podcidr, neighbors from /work/neighbors.json — if podcidr
        # is missing gomplate errors and the init restarts.
        - name: prepare-config
          image: "gomplate/gomplate:{{ .Values.tooling.gomplate.version }}"
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          args:
            - --left-delim
            - "[["
            - --right-delim
            - "]]"
            - --datasource
            - podcidr=/work/podcidr
            - --datasource
            - neighbors=/work/neighbors.json
            - --file
            - /config/speaker.conf.tpl
            - --out
            - /etc/frr/frr.conf
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            - { name: etc-frr, mountPath: /etc/frr }
            - { name: work, mountPath: /work }
      containers:
        - name: frr
          image: "quay.io/frrouting/frr:{{ .Values.tooling.frr.version }}"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW", "NET_BIND_SERVICE", "SYS_ADMIN"]
          command: ["sh", "-c", "exec /usr/lib/frr/docker-start"]
          volumeMounts:
            - { name: etc-frr, mountPath: /etc/frr }
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.debug }}
        # debug sidecar: shares the pod netns + volumes + caps. Exec in to inspect BGP,
        # the rendered /etc/frr/frr.conf, and /work/podcidr. imagePullPolicy Always since
        # cnuss/dev:latest is a moving tag.
        - name: debug
          image: "cnuss/dev:latest"
          imagePullPolicy: Always
          command: ["sleep", "infinity"]
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW", "NET_BIND_SERVICE", "SYS_ADMIN"]
          volumeMounts:
            - { name: config, mountPath: /config, readOnly: true }
            - { name: etc-frr, mountPath: /etc/frr }
            - { name: work, mountPath: /work }
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}
        - name: etc-frr
          emptyDir: {}
        - name: work
          emptyDir: {}
