# The speaker's init containers read NodeNetworkConfigs (discover-podcidr: its own node's, for
# the pod CIDR; discover-neighbors: LISTs all, for AKS peer nodeIPs) and nodes (discover-podcidr:
# its own node's flex.azure.com/pod-* labels; discover-neighbors: LISTs flex nodes by the
# flex.azure.com/pod-network label for their IPs). Read-only: get+list on both.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
rules:
  - apiGroups: ["acn.azure.com"]
    resources: ["nodenetworkconfigs"]
    verbs: ["get", "list"]
  # nodes: discover-podcidr gets its own node's flex.azure.com/pod-* labels; discover-neighbors
  # lists nodes by the flex.azure.com/pod-network label to find flex-node IPs
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
