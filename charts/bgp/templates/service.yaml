# Headless Service fronting the FRR speaker DaemonSet. clusterIP: None means no VIP and no
# load-balancing — DNS (bgp.<ns>.svc) returns one A record per endpoint. Since the speaker pods
# are hostNetwork, those endpoints are the node IPs, so this resolves to every speaker's real
# node IP (for discovering / peering the speakers by their actual BGP addresses).
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: bgp
      port: 179
      targetPort: 179
      protocol: TCP
