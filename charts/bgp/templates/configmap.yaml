# Two-level templating: helm renders the static knobs (ASN) at package
# time; gomplate renders the per-node values at pod start (custom [[ ]] delimiters, so
# helm and gomplate never collide) — .Env.HOST_IP (downward API) and the pod CIDR read
# from the /work/podcidr datasource that discover-podcidr wrote from NodeNetworkConfig.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
data:
  daemons: |
    # FRR daemons to launch. zebra always runs; we only add bgpd.
    bgpd=yes
    ospfd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    pim6d=no
    ldpd=no
    nhrpd=no
    eigrpd=no
    babeld=no
    sharpd=no
    pbrd=no
    bfdd=no
    fabricd=no
    vrrpd=no
    pathd=no

    vtysh_enable=yes
    zebra_options="  -A 127.0.0.1 -s 90000000"
    bgpd_options="   -A 127.0.0.1"
  # the node speaker: a bare BGP router advertising this node's pod CIDR. No neighbors yet —
  # peers (and any peer-specific knobs, e.g. resolve-via-default / ebgp-multihop) come later.
  speaker.conf.tpl: |
    frr defaults traditional
    log stdout
    !
    router bgp {{ .Values.asn }}
     bgp router-id [[ .Env.HOST_IP ]]
     no bgp ebgp-requires-policy
     no bgp network import-check
     !
     address-family ipv4 unicast
      network [[ (ds "podcidr") | strings.TrimSpace ]]
     exit-address-family
    !
    line vty
