# Two-level templating: helm renders the static knobs (ASN) at package
# time; gomplate renders the per-node values at pod start (custom [[ ]] delimiters, so
# helm and gomplate never collide) — .Env.HOST_IP (downward API) and the pod CIDR read
# from the /work/podcidr datasource that discover-podcidr wrote from NodeNetworkConfig.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
data:
  daemons: |
    # FRR daemons to launch. zebra always runs; we only add bgpd.
    bgpd=yes
    ospfd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    pim6d=no
    ldpd=no
    nhrpd=no
    eigrpd=no
    babeld=no
    sharpd=no
    pbrd=no
    bfdd=no
    fabricd=no
    vrrpd=no
    pathd=no

    vtysh_enable=yes
    zebra_options="  -A 127.0.0.1 -s 90000000"
    bgpd_options="   -A 127.0.0.1"
  # the node speaker: a BGP router advertising this node's pod CIDR and peering every other node
  # discovered into /work/neighbors.json (iBGP — shared .Values.asn). On the RELAY node (the pod
  # whose HOST_IP == .Values.relay.nodeIP) it ALSO eBGP-peers the Azure Route Server and re-
  # advertises the mesh's per-node /24s with next-hop preserved (attribute-unchanged), filtered to
  # the AKS pod aggregate — so the RS injects each /24 -> its owning node and advertises to AWS.
  speaker.conf.tpl: |
    frr defaults traditional
    log stdout
    !
    [[- if eq .Env.HOST_IP "{{ .Values.relay.nodeIP }}" ]]
    ! relay: only the AKS pod /24s (next-hops are in-VNet AKS node IPs) go to the Route Server;
    ! the flex /25s are excluded (their next-hop is an AWS IP, not routable in the VNet).
    ip prefix-list RS-PODS seq 5 permit 192.168.0.0/16 le 24
    route-map RS-OUT permit 10
     match ip address prefix-list RS-PODS
    !
    [[- end ]]
    router bgp {{ .Values.asn }}
     bgp router-id [[ .Env.HOST_IP ]]
     no bgp ebgp-requires-policy
     no bgp network import-check
    [[- range (ds "neighbors") ]]
     neighbor [[ . ]] remote-as {{ .Values.asn }}
    [[- end ]]
    [[- if eq .Env.HOST_IP "{{ .Values.relay.nodeIP }}" ]]
    {{- range .Values.relay.routeServerAddresses }}
     neighbor {{ . }} remote-as {{ $.Values.relay.routeServerAsn }}
     neighbor {{ . }} ebgp-multihop
    {{- end }}
    [[- end ]]
     !
     address-family ipv4 unicast
      network [[ (ds "podcidr") | strings.TrimSpace ]]
    [[- range (ds "neighbors") ]]
      neighbor [[ . ]] activate
    [[- end ]]
    [[- if eq .Env.HOST_IP "{{ .Values.relay.nodeIP }}" ]]
    {{- range .Values.relay.routeServerAddresses }}
      neighbor {{ . }} activate
      neighbor {{ . }} attribute-unchanged next-hop
      neighbor {{ . }} route-map RS-OUT out
    {{- end }}
    [[- end ]]
     exit-address-family
    !
    line vty
