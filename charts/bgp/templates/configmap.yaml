# Two-level templating: helm renders the static knobs (ASN, RS peers) at package time; the
# prepare-config init container then sed-substitutes the two per-node values at pod start —
# __ROUTER_ID__ (HOST_IP, downward API) and __POD_CIDR__ (the /24 discover-podcidr wrote to
# /work/podcidr from NodeNetworkConfig). Placeholders are __UPPERCASE__ so they never collide
# with helm's Go-template braces.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
data:
  daemons: |
    # FRR daemons to launch. zebra always runs; we only add bgpd.
    bgpd=yes
    ospfd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    pim6d=no
    ldpd=no
    nhrpd=no
    eigrpd=no
    babeld=no
    sharpd=no
    pbrd=no
    bfdd=no
    fabricd=no
    vrrpd=no
    pathd=no

    vtysh_enable=yes
    zebra_options="  -A 127.0.0.1 -s 90000000"
    bgpd_options="   -A 127.0.0.1"
  # The system-node relay: a BGP router that advertises THIS node's own pod /24 (from
  # /work/podcidr, discovered from NodeNetworkConfig — e.g. 192.168.6.0/24) to the Azure Route
  # Server over eBGP, next-hop left as this node's underlay IP so the RS injects "that /24 -> this
  # node" into the VNet (and the VPN gateway carries it to AWS). RS-OUT is a belt-and-suspenders
  # filter: only an AKS pod /24 may ever leave toward the RS. No iBGP mesh and no neighbor
  # discovery — full pod-to-pod is abandoned, so this speaker peers nothing but the Route Server.
  speaker.conf.tpl: |
    frr defaults traditional
    log stdout
    !
    ! only an AKS pod /24 may be advertised to the Route Server (its next-hop is this in-VNet
    ! system node); nothing else should ever leak toward the RS.
    ip prefix-list RS-PODS seq 5 permit 192.168.0.0/16 le 24
    route-map RS-OUT permit 10
     match ip address prefix-list RS-PODS
    !
    router bgp {{ .Values.asn }}
     bgp router-id __ROUTER_ID__
     no bgp ebgp-requires-policy
     no bgp network import-check
    {{- range .Values.relay.routeServerAddresses }}
     neighbor {{ . }} remote-as {{ $.Values.relay.routeServerAsn }}
     neighbor {{ . }} ebgp-multihop
    {{- end }}
     !
     address-family ipv4 unicast
      network __POD_CIDR__
    {{- range .Values.relay.routeServerAddresses }}
      neighbor {{ . }} activate
      neighbor {{ . }} attribute-unchanged next-hop
      neighbor {{ . }} route-map RS-OUT out
    {{- end }}
     exit-address-family
    !
    line vty
