apiVersion: v2
name: bgp
description: >-
  FRR BGP relay speaker (DaemonSet, pinned to the AKS system node) — advertises that
  node's own pod /24 (discovered from Azure NodeNetworkConfig) to the Azure Route Server,
  making CoreDNS + istiod reachable off-cluster (flex nodes over the VPN). No iBGP mesh:
  full pod-to-pod is abandoned, so it peers only the Route Server.
type: application
version: 0.3.0
appVersion: "10.2.1"
